<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadê Meu Pedido · Painel</title>
<style>
  :root{ --brand:#c2185b; --orange:#f97316; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f5f7;color:#222}
  a{color:inherit}
  /* layout */
  .shell{display:flex;min-height:100vh}
  .side{width:230px;background:#fff;border-right:1px solid #e9eaee;flex:none;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .logo{padding:20px 18px;font-weight:900;color:var(--orange);font-size:16px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  .nav{flex:1;overflow:auto;padding:6px}
  .nav a{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:11px 14px;margin:2px 6px;border-radius:10px;color:#555;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none}
  .nav a .ic{width:20px;text-align:center}
  .nav a.active{background:#fff0f6;color:var(--brand)}
  .nav a:hover{background:#f7f7fa}
  .nav a .cnt{font-size:12px;background:#eef0f4;color:#666;border-radius:20px;padding:1px 8px;font-weight:700}
  .nav a.active .cnt{background:var(--brand);color:#fff}
  .side .me{border-top:1px solid #eee;padding:14px 16px;font-size:12px;color:#777}
  .side .me b{color:#333;display:block;font-size:13px}
  .main{flex:1;min-width:0}
  .topbar{background:#fff;border-bottom:1px solid #e9eaee;padding:14px 22px;position:sticky;top:0;z-index:5}
  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-size:12px;color:#888;font-weight:600}
  .fld input,.fld select{padding:9px 11px;border:1px solid #dfe1e6;border-radius:9px;font-size:14px;min-width:150px;background:#fff}
  .content{padding:18px 22px}
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:#fff;border:1px solid #e9eaee;cursor:pointer;font-size:13px;font-weight:600;color:#555}
  .chip.active{border-color:var(--brand);color:var(--brand);box-shadow:0 0 0 1px var(--brand) inset}
  .chip .n{font-weight:800}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  th,td{padding:12px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f1f2f4}
  th{background:#fafbfc;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8a8f99}
  tr:hover td{background:#fbfbfd}
  .pill{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700}
  .btn{background:var(--brand);color:#fff;border:none;padding:9px 15px;border-radius:9px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:#fff;color:#444;border:1px solid #dcdde1}
  .btn.orange{background:var(--orange)}
  .link{color:var(--brand);cursor:pointer;font-weight:700}
  .muted{color:#8a8f99;font-size:12px}
  input,textarea,select{font:inherit}
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,30,.45);display:none;align-items:flex-start;justify-content:center;z-index:20;padding:24px;overflow:auto}
  .modal{background:#fff;border-radius:16px;max-width:900px;width:100%;padding:24px;margin:auto}
  #login{max-width:460px;margin:80px auto;background:#fff;padding:26px;border-radius:14px;text-align:center;box-shadow:0 6px 26px rgba(0,0,0,.08)}
  @media(max-width:820px){ .side{display:none} }
</style>
</head>
<body>
<div id="login" style="display:none">
  <h2 style="color:var(--brand)">Cadê Meu Pedido</h2>
  <p class="muted">Você precisa estar logado no Sistema Grupo Aragão para acessar este painel.</p>
  <a class="btn" href="/" style="display:inline-block;text-decoration:none;margin-top:10px">Ir para o login</a>
</div>

<div id="app" class="shell" style="display:none">
  <aside class="side">
    <div class="logo">📦 CADÊ MEU PEDIDO</div>
    <nav class="nav" id="nav"></nav>
    <div class="me"><b id="meNome">—</b><span id="meEmail"></span><br><a class="link" href="/" style="font-size:12px">Sair</a></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="filters">
        <div class="fld"><label>Pedido</label><input id="fPedido" placeholder="123456" oninput="__deb()"></div>
        <div class="fld"><label>Nota Fiscal</label><input id="fNF" placeholder="123456" oninput="__deb()"></div>
        <div class="fld"><label>Situação</label><select id="fSit" onchange="applyFilters()"><option value="">Todas</option></select></div>
        <div class="fld"><label>Transportadora</label><select id="fTrans" onchange="applyFilters()"><option value="">Selecione</option></select></div>
        <div class="fld"><label>Código de Rastreio</label><input id="fRastreio" placeholder="AA123..." oninput="__deb()"></div>
        <button class="btn ghost" onclick="load()">↻ Atualizar</button>
        <button class="btn orange" id="runBtn" onclick="__runCycle()">Rodar ciclo</button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script type="module">
const SUPABASE_REF='wwytzoyeibekhstinott';
function readSession(){
  try{ let raw=localStorage.getItem('sb-'+SUPABASE_REF+'-auth-token');
    if(!raw){ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)){ raw=localStorage.getItem(k); break; } } }
    if(!raw) return null; const o=JSON.parse(raw); return {tok:o.access_token||o.currentSession?.access_token||null, user:o.user||o.currentSession?.user||null};
  }catch(e){ return null; }
}
let TOKEN=null, USER=null;

const STATUS={
  criado:['Criado','#eef1f6','#5b6472'], pago:['Pago','#e8ebff','#3f51b5'], em_separacao:['Em Separação','#f0e9ff','#7e57c2'],
  faturado:['Faturado','#e0f5f1','#00897b'], enviado:['Enviado','#e3f0fd','#1e88e5'], aguardando_retirada:['Aguardando Retirada','#fff6e0','#c98a00'],
  atrasado:['Atrasado','#fde8e8','#e53935'], entregue:['Entregue','#e6f6ea','#2e9e4a'], devolvido:['Devolvido','#efe7e2','#8d6e63'], cancelado:['Cancelado','#eceef1','#616161']
};
const ORDER=Object.keys(STATUS);
const CARRIERS={ correios:['Correios','#003399','#FFE11A'], jt:['J&T Express','#ffffff','#E2231A'], melhorenvio:['Melhor Envio','#ffffff','#0FAA57'], total:['Total Express','#ffffff','#12276b'], local:['Personalizada','#ffffff','#c2185b'], motoboy:['Motoboy','#ffffff','#c2185b'], sem:['Sem transportadora','#555','#eceef1'] };
const fmtD=d=>d?new Date(d).toLocaleDateString('pt-BR'):'—';
const fmt=d=>d?new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const money=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pill=s=>{const x=STATUS[s]||[s,'#eee','#555'];return `<span class="pill" style="background:${x[1]};color:${x[2]}">${x[0]}</span>`;};
const carrierBadge=t=>{const c=CARRIERS[t]||[t||'—','#555','#eceef1'];return `<span style="display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:800;color:${c[1]};background:${c[2]}">${esc(c[0])}</span>`;};
function prazoTxt(o){
  if(['entregue','cancelado','devolvido'].includes(o.status)) return '—';
  if(!o.prazo_entrega) return '<span class="muted">—</span>';
  const diff=Math.ceil((new Date(o.prazo_entrega)-Date.now())/86400000);
  if(diff<0) return `<span style="color:#e53935;font-weight:700">Atrasado (${-diff}d)</span>`;
  if(diff===0) return `<span style="color:#c98a00;font-weight:700">Entrega hoje</span>`;
  return `Faltam ${diff} dia${diff>1?'s':''}`;
}
const api=(path,opts={})=>fetch('/api/'+path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}}).then(r=>r.json());

const NAV=[
  ['pedidos','🛒','Pedidos'], ['atrasados','🚚','Atrasados'], ['acareacoes','👥','Acareações'],
  ['ocorrencias','⚠️','Ocorrências'], ['devolucao','↩️','Devolução'],
  ['retirada','🏬','Retirada & Entrega'], ['regras','⚙️','Regras'],
];
let VIEW='pedidos';
let DATA={orders:[],counts:{}};
let filt={status:'',q:''};

async function boot(){
  const s=readSession();
  if(!s||!s.tok){ document.getElementById('login').style.display='block'; return; }
  TOKEN=s.tok; USER=s.user;
  document.getElementById('app').style.display='flex';
  document.getElementById('meNome').textContent=(USER&&(USER.user_metadata?.name||USER.email))||'Equipe Dra. Charm';
  document.getElementById('meEmail').textContent=(USER&&USER.email)||'';
  // situação options
  const fSit=document.getElementById('fSit'); ORDER.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=STATUS[s][0];fSit.appendChild(o);});
  const fTr=document.getElementById('fTrans'); Object.keys(CARRIERS).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=CARRIERS[k][0];fTr.appendChild(o);});
  renderNav();
  await load();
}
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=NAV.map(n=>{
    const c=DATA.counts||{};
    let cnt='';
    if(n[0]==='atrasados') cnt=c.atrasado||0;
    else if(n[0]==='acareacoes') cnt=c._acareacao||0;
    else if(n[0]==='devolucao') cnt=c.devolvido||0;
    return `<a class="${VIEW===n[0]?'active':''}" onclick="__go('${n[0]}')"><span><span class="ic">${n[1]}</span> ${n[2]}</span>${cnt?`<span class="cnt">${cnt}</span>`:''}</a>`;
  }).join('');
}
window.__go=(v)=>{ VIEW=v; renderNav(); render(); };
window.__runCycle=async()=>{ const b=document.getElementById('runBtn'); b.textContent='Rodando…'; try{await api('rastreio-sync');}catch(e){} b.textContent='Rodar ciclo'; load(); };

async function load(){
  document.getElementById('view').innerHTML='<p class="muted">Carregando…</p>';
  const qs=filt.status?`?status=${filt.status}`:'';
  DATA=await api('rastreio-orders'+qs+(filt.q?`${filt.status?'&':'?'}q=${encodeURIComponent(filt.q)}`:''));
  renderNav(); render();
}
let debT;
window.__deb=()=>{ clearTimeout(debT); debT=setTimeout(applyFilters,350); };
window.applyFilters=()=>{
  filt.status=document.getElementById('fSit').value;
  filt.q=document.getElementById('fPedido').value.trim();
  load();
};
function clientFilter(orders){
  const nf=(document.getElementById('fNF')?.value||'').trim();
  const tr=document.getElementById('fTrans')?.value||'';
  const rk=(document.getElementById('fRastreio')?.value||'').trim().toLowerCase();
  return orders.filter(o=>
    (!nf||String(o.nota_fiscal||'').includes(nf)) &&
    (!tr||o.transportadora===tr) &&
    (!rk||String(o.tracking_code||'').toLowerCase().includes(rk))
  );
}

function render(){
  const v=document.getElementById('view');
  if(VIEW==='regras') return renderRules(v);
  if(VIEW==='retirada') return renderRetirada(v);
  let orders=DATA.orders||[]; const c=DATA.counts||{};
  if(VIEW==='atrasados') orders=orders.filter(o=>o.status==='atrasado');
  if(VIEW==='acareacoes') orders=orders.filter(o=>o.acareacao_aberta);
  if(VIEW==='ocorrencias') orders=orders.filter(o=>o.ocorrencia);
  if(VIEW==='devolucao') orders=orders.filter(o=>o.status==='devolvido');
  orders=clientFilter(orders);
  const chips=['<span class="chip '+(!filt.status?'active':'')+'" onclick="__chip(\'\')"><span class="n">'+(c._total||0)+'</span> Todos</span>']
    .concat(['pago','faturado','enviado','atrasado','entregue','devolvido'].map(s=>`<span class="chip ${filt.status===s?'active':''}" onclick="__chip('${s}')"><span class="n" style="color:${STATUS[s][2]}">${c[s]||0}</span> ${STATUS[s][0]}</span>`)).join('');
  v.innerHTML=`
    ${VIEW==='pedidos'?`<div class="chips">${chips}</div>`:`<h2 style="margin:2px 0 14px">${NAV.find(n=>n[0]===VIEW)[2]}</h2>`}
    <table><thead><tr>
      <th>Situação</th><th>Pedido</th><th>Nota Fiscal</th><th>Preço</th><th>Criação do Pedido</th><th>Prazo de Entrega</th><th>Transportadora</th><th>Ocorrência</th><th style="text-align:center">Visitas</th>
    </tr></thead><tbody>
    ${orders.map(o=>`<tr>
      <td>${pill(o.status)}</td>
      <td><span class="link" onclick="__open(${o.id})">${esc(o.numero)}</span></td>
      <td>${esc(o.nota_fiscal)||'—'}</td>
      <td>${money(o.preco)}</td>
      <td>${fmtD(o.criado_em)}</td>
      <td>${prazoTxt(o)}</td>
      <td>${carrierBadge(o.transportadora)}${o.acareacao_aberta?' <span title="Acareação aberta" style="color:#e53935">●</span>':''}</td>
      <td class="muted" style="max-width:150px">${esc((o.ocorrencia||'').slice(0,42))||'—'}</td>
      <td style="text-align:center">${o.visitas||0}</td>
    </tr>`).join('')||'<tr><td colspan="9" class="muted" style="text-align:center;padding:26px">Nenhum pedido aqui.</td></tr>'}
    </tbody></table>
    <div class="muted" style="margin-top:8px">Exibindo ${orders.length} pedido(s)${VIEW==='pedidos'?` · Total no sistema: ${c._total||0}`:''}.</div>`;
}
window.__chip=(s)=>{ filt.status=s; document.getElementById('fSit').value=s; load(); };

/* ---------- Detalhe do pedido (espelha o cademeupedido original) ---------- */
const FUNNEL=[['criado','Criado'],['pago','Pago'],['faturado','Faturado'],['enviado','Enviado'],['entregue','Entregue']];
const FPOS={criado:0,pago:1,em_separacao:1,faturado:2,enviado:3,atrasado:3,aguardando_retirada:3,entregue:4,devolvido:4,cancelado:1};
function bordadoRows(b){
  if(!b||!Array.isArray(b)||!b.length) return '';
  const inner=b.map(x=>{const nome=[x.linha1,x.linha2].filter(Boolean).join(' · ');const det=[x.tipo,x.cor&&('cor '+x.cor),x.fonte&&('fonte '+x.fonte),x.lado].filter(Boolean).join(' · ');
    return `<div style="padding:3px 0"><b style="color:var(--brand)">✒️ ${esc(nome)||'Personalização'}</b>${det?` <span class="muted">(${esc(det)})</span>`:''}${x.detalhes?`<div class="muted">${esc(x.detalhes)}</div>`:''}</div>`;}).join('');
  return `<tr><th>Bordado</th><td>${inner}</td></tr>`;
}
function funnelRuler(o,history){
  const dateOf={criado:o.criado_em,pago:null,faturado:null,enviado:o.data_envio,entregue:o.data_entrega};
  (history||[]).slice().reverse().forEach(h=>{ if(h.to_status&&dateOf[h.to_status]==null) dateOf[h.to_status]=h.created_at; });
  const pos=FPOS[o.status]??0; const special=(o.status==='cancelado'||o.status==='devolvido'||o.status==='atrasado');
  return `<div style="position:relative;padding-left:4px">`+FUNNEL.map((s,i)=>{
    const done=i<=pos && !(special&&o.status!=='atrasado'&&i>1); const isCur=i===pos;
    const line=i<FUNNEL.length-1?`<div style="position:absolute;left:14px;top:24px;width:2px;height:26px;background:${i<pos?'var(--brand)':'#e5e7eb'}"></div>`:'';
    return `<div style="position:relative;display:flex;gap:12px;align-items:flex-start;min-height:44px">${line}
      <div style="width:22px;height:22px;border-radius:50%;flex:none;background:${done?'var(--brand)':'#e5e7eb'};color:#fff;font-size:12px;line-height:22px;text-align:center;font-weight:700">${done?'✓':i+1}</div>
      <div><div style="font-weight:${isCur?'800':'600'};color:${done?'#222':'#999'}">${s[1]}</div>
      <div class="muted" style="font-size:12px">${dateOf[s[0]]?fmt(dateOf[s[0]]):(done?'':'—')}</div></div></div>`;
  }).join('')+`</div>`+(special?`<div style="margin-top:8px;background:#fde8e8;border:1px solid #ffcdd2;color:#c62828;padding:8px 10px;border-radius:8px;font-size:13px">Situação atual: <b>${STATUS[o.status][0]}</b></div>`:'');
}
function produtosBlock(prod){
  if(!prod||!Array.isArray(prod)||!prod.length) return '<p class="muted">Produtos não carregados ainda (rode o enriquecimento da LI).</p>';
  return prod.map(p=>`
    <div style="display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid #f2f2f2">
      <div style="position:relative;width:52px;height:52px;flex:none">
        <div style="width:52px;height:52px;border-radius:8px;border:1px solid #eee;background:#f3f3f5 center/cover no-repeat${p.imagem?` url('${esc(p.imagem)}')`:''}"></div>
        <span style="position:absolute;bottom:-6px;left:-6px;background:var(--brand);color:#fff;font-size:11px;font-weight:800;border-radius:20px;min-width:18px;height:18px;line-height:18px;text-align:center;padding:0 4px">${p.qtd||1}</span>
      </div>
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${esc(p.nome)||esc(p.sku)}</div>
        <div class="muted" style="font-size:12px">${p.tamanho?('Tam '+esc(p.tamanho)+' · '):''}${esc(p.sku)||''}</div></div>
      <div style="font-weight:700;font-size:13px">${money(p.preco)}</div>
    </div>`).join('');
}
function clienteBlock(o){
  const c=(o.raw&&o.raw.cliente_contato)||{};
  return [o.cliente_email?`✉️ ${esc(o.cliente_email)}`:'', c.telefone?`📞 ${esc(c.telefone)}`:'', c.documento?`🪪 ${esc(c.documento)}`:''].filter(Boolean).join(' &nbsp;·&nbsp; ');
}
function enderecoBlock(o){
  const e=o.raw&&o.raw.endereco_entrega; if(!e) return '';
  const linha=typeof e==='string'?e:[e.endereco||e.logradouro,e.numero,e.complemento,e.bairro,[e.cidade,e.estado||e.uf].filter(Boolean).join('/'),e.cep].filter(Boolean).join(', ');
  return linha?`<div style="margin-top:8px"><b style="font-size:13px">Endereço de entrega</b><div class="muted" style="font-size:13px">📍 ${esc(linha)}</div></div>`:'';
}
window.__open=async(id)=>{
  const {order:o,events,history}=await api('rastreio-orders?id='+id);
  const tl=(events||[]).map((e,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f2f2f2"><div style="width:9px;height:9px;border-radius:50%;background:${i===0?'var(--brand)':'#ccc'};margin-top:5px;flex:none"></div><div><b style="font-size:13px">${esc(e.descricao)}</b><div class="muted" style="font-size:12px">${fmt(e.data)}${e.local?' · '+esc(e.local):''}</div></div></div>`).join('')||'<p class="muted">Sem eventos da transportadora ainda.</p>';
  const btns=ORDER.map(s=>`<button class="btn ghost" onclick="__st(${id},'${s}')" style="margin:0 5px 6px 0;${o.status===s?`border-color:${STATUS[s][2]};color:${STATUS[s][2]};font-weight:700`:''}">${STATUS[s][0]}</button>`).join('');
  document.getElementById('modal').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
      <div><div class="muted" style="font-size:12px">PEDIDO</div><h2 style="margin:0">#${esc(o.numero)} ${pill(o.status)}</h2>
      <div style="font-weight:700;margin-top:4px">${esc(o.cliente_nome)||'—'}</div>
      <div class="muted">${clienteBlock(o)}</div></div>
      <span class="link" onclick="__close()">fechar ✕</span>
    </div>
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:22px;margin-top:12px">
      <div>
        <h3 style="margin:2px 0 4px">Produtos</h3>
        ${produtosBlock(o.raw&&o.raw.produtos)}
        <table style="box-shadow:none;margin-top:8px">
          <tr><th>Nota Fiscal</th><td>${esc(o.nota_fiscal)||'—'}</td></tr>
          <tr><th>Total do Pedido</th><td>${money(o.preco)}</td></tr>
          <tr><th>Transportadora</th><td>${carrierBadge(o.transportadora)} <span class="muted">${esc(o.servico||'')}</span></td></tr>
          <tr><th>Código de Rastreio</th><td>${esc(o.tracking_code)||'—'}</td></tr>
          ${bordadoRows(o.raw&&o.raw.bordado)}
          <tr><th>Prazo de Entrega</th><td>${o.prazo_entrega?fmtD(o.prazo_entrega):'—'} ${['entregue','cancelado','devolvido'].includes(o.status)?'':'· '+prazoTxt(o)}</td></tr>
          <tr><th>Visitas do cliente</th><td>${o.visitas||0}</td></tr>
          <tr><th>Acareação</th><td>${o.acareacao_aberta?`<span style="color:#e53935;font-weight:700">Aberta</span> ${fmtD(o.acareacao_em)} <button class="btn ghost" onclick="__ac(${id})">Encerrar</button>`:'—'}</td></tr>
        </table>
        ${enderecoBlock(o)}
      </div>
      <div>
        <h3 style="margin-top:0">Linha do tempo</h3>
        ${funnelRuler(o,history)}
        <h3 style="margin:16px 0 4px">Rastreio da transportadora</h3>
        <div style="max-height:170px;overflow:auto">${tl}</div>
      </div>
    </div>
    <div style="margin-top:16px;border-top:1px solid #eee;padding-top:12px">
      <div class="muted" style="margin-bottom:6px">Alterar situação (sincroniza com a Loja Integrada):</div>${btns}
      <div style="margin-top:8px"><button class="btn" onclick="__trk(${id})">Rastrear agora</button>
      <a class="btn ghost" style="text-decoration:none" target="_blank" href="/rastreio.html">Ver página do cliente ↗</a></div>
    </div>`;
  document.getElementById('modalBg').style.display='flex';
};
window.__close=()=>document.getElementById('modalBg').style.display='none';
window.__st=async(id,s)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:s})}); __open(id); load(); };
window.__trk=async(id)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'track',id})}); __open(id); };
window.__ac=async(id)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'closeAcareacao',id})}); __open(id); load(); };

/* ---------- Retirada & Entrega ---------- */
function renderRetirada(v){
  const local=(DATA.orders||[]).filter(o=>['local','motoboy'].includes(o.transportadora)&&!['entregue','cancelado','devolvido'].includes(o.status));
  v.innerHTML=`<h2 style="margin:2px 0 6px">Retirada na loja & Entrega local (motoboy)</h2>
    <p class="muted" style="margin-bottom:12px">As meninas confirmam a <b>retirada</b> aqui; o motoboy confirma pela <a class="link" href="/entrega.html" target="_blank">página do entregador</a>. Ao confirmar, o pedido vira <b>Entregue</b>.</p>
    <table><thead><tr><th>Situação</th><th>Pedido</th><th>Cliente</th><th>Serviço</th><th>Destino</th><th>Criação</th><th></th></tr></thead><tbody>
    ${local.map(o=>`<tr id="lr${o.id}"><td>${pill(o.status)}</td><td><span class="link" onclick="__open(${o.id})">${esc(o.numero)}</span></td>
      <td>${esc(o.cliente_nome)||'—'}</td><td>${esc(o.servico)||carrierBadge(o.transportadora)}</td><td>${esc(o.destino)||'—'}</td><td>${fmtD(o.criado_em)}</td>
      <td><button class="btn" onclick="__entregar(${o.id})">✓ Entregue</button></td></tr>`).join('')||'<tr><td colspan="7" class="muted" style="text-align:center;padding:24px">Nenhuma entrega local pendente.</td></tr>'}
    </tbody></table>`;
}
window.__entregar=async(id)=>{ if(!confirm('Confirmar entrega/retirada deste pedido?'))return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:'entregue'})}); const r=document.getElementById('lr'+id); if(r)r.remove(); };

/* ---------- Regras ---------- */
async function renderRules(v){
  const {rules}=await api('rastreio-rules');
  v.innerHTML=`<h2 style="margin:2px 0 4px">Regras de automação</h2>
    <p class="muted">Condições (when) e ações (then). Ex.: sem rastreio há 2 dias → alerta interno.</p>
    <table><thead><tr><th>Ativa</th><th>Nome</th><th>Prio.</th><th>when</th><th>then</th><th></th></tr></thead><tbody>
    ${(rules||[]).map(r=>`<tr><td>${r.enabled?'Sim':'Não'}</td><td><b>${esc(r.name)}</b></td><td>${r.priority}</td>
      <td class="muted"><code>${esc(JSON.stringify(r.when_json))}</code></td><td class="muted"><code>${esc(JSON.stringify(r.then_json))}</code></td>
      <td><button class="btn ghost" onclick="__rt(${r.id})">${r.enabled?'Desativar':'Ativar'}</button> <button class="btn ghost" onclick="__rd(${r.id})">Excluir</button></td></tr>`).join('')}
    </tbody></table>
    <div style="background:#fff;border-radius:12px;padding:16px;margin-top:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <h4>Nova regra</h4>
      <div style="display:grid;grid-template-columns:1fr 120px;gap:10px">
        <input id="rn" placeholder="Nome da regra"><input id="rp" type="number" value="100">
        <textarea id="rw" rows="2" style="grid-column:1/3;border:1px solid #ddd;border-radius:8px;padding:8px">{"carrier":["correios"],"statusIn":["enviado"],"noTrackingCode":true,"daysSinceSentGte":2}</textarea>
        <textarea id="rt2" rows="2" style="grid-column:1/3;border:1px solid #ddd;border-radius:8px;padding:8px">{"alertInternal":true}</textarea>
        <div style="grid-column:1/3"><button class="btn" onclick="__rsave()">Salvar regra</button></div>
      </div>
    </div>`;
}
window.__rt=async id=>{ await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'toggle',id})}); renderRules(document.getElementById('view')); };
window.__rd=async id=>{ if(confirm('Excluir regra?')){ await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'delete',id})}); renderRules(document.getElementById('view')); } };
window.__rsave=async()=>{ try{ const body={name:document.getElementById('rn').value,priority:document.getElementById('rp').value,when:JSON.parse(document.getElementById('rw').value),then:JSON.parse(document.getElementById('rt2').value)}; await api('rastreio-rules',{method:'POST',body:JSON.stringify(body)}); renderRules(document.getElementById('view')); }catch(e){ alert('JSON inválido: '+e.message); } };

boot();
</script>
</body>
</html>
