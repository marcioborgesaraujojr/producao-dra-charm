<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadê Meu Pedido · Painel</title>
<style>
  :root{ --brand:#c2185b; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f5f7;color:#222}
  header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:5}
  header .brand{font-weight:800;color:var(--brand);font-size:17px}
  .tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;color:#555;border:none;background:none;font-size:14px}
  .tab.active{background:var(--brand);color:#fff}
  .wrap{max-width:1200px;margin:18px auto;padding:0 16px}
  .kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .kpi{background:#fff;border-radius:12px;padding:14px 18px;flex:1;min-width:150px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .kpi .n{font-size:26px;font-weight:800}
  .kpi .l{color:#888;font-size:12px}
  .chips{margin-bottom:10px}
  .chip{display:inline-block;padding:6px 12px;border-radius:20px;background:#fff;border:1px solid #e5e7eb;margin:0 6px 8px 0;cursor:pointer;font-size:13px}
  .chip b{color:var(--brand)}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  th,td{padding:9px 11px;text-align:left;font-size:13px;border-bottom:1px solid #f0f0f0}
  th{background:#fafafa;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#888}
  tr:hover td{background:#fbfbfd}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
  .btn{background:var(--brand);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:#fff;color:#444;border:1px solid #ddd}
  input,textarea,select{font:inherit;padding:8px 10px;border:1px solid #ddd;border-radius:8px}
  .muted{color:#888;font-size:12px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:10;padding:16px}
  .modal{background:#fff;border-radius:14px;max-width:820px;width:100%;max-height:88vh;overflow:auto;padding:22px}
  .link{color:var(--brand);cursor:pointer;font-weight:700}
  #login{max-width:460px;margin:80px auto;background:#fff;padding:26px;border-radius:14px;text-align:center;box-shadow:0 6px 26px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div id="login" style="display:none">
  <h2 style="color:var(--brand)">Cadê Meu Pedido</h2>
  <p class="muted">Você precisa estar logado no Sistema Grupo Aragão para acessar este painel.</p>
  <a class="btn" href="/" style="display:inline-block;text-decoration:none;margin-top:10px">Ir para o login</a>
</div>

<div id="app" style="display:none">
  <header>
    <span class="brand">Cadê Meu Pedido</span>
    <button class="tab active" data-tab="orders">Pedidos</button>
    <button class="tab" data-tab="late">Atrasados &amp; Acareação</button>
    <button class="tab" data-tab="retirada">Retirada &amp; Entrega</button>
    <button class="tab" data-tab="rules">Regras</button>
    <span style="flex:1"></span>
    <a class="btn ghost" style="text-decoration:none" target="_blank" href="/entrega.html">Página do entregador ↗</a>
    <button class="btn ghost" id="runBtn">Rodar ciclo agora</button>
  </header>
  <div class="wrap" id="view"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script type="module">
// Reaproveita a sessão do Supabase que o próprio suite já guarda no navegador
// (mesma origem). Não precisa de chave nenhuma embutida aqui.
const SUPABASE_REF = 'wwytzoyeibekhstinott';
function readSession(){
  try{
    // supabase-js v2 guarda em "sb-<ref>-auth-token"
    let raw = localStorage.getItem('sb-'+SUPABASE_REF+'-auth-token');
    if(!raw){ // fallback: procura qualquer chave de auth do supabase
      for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)){ raw=localStorage.getItem(k); break; } }
    }
    if(!raw) return null;
    const o = JSON.parse(raw);
    return o.access_token || o.currentSession?.access_token || (Array.isArray(o)?o[0]:null) || null;
  }catch(e){ return null; }
}
let TOKEN = null;

const STATUS = {
  criado:['Criado','#9e9e9e'], pago:['Pago','#3f51b5'], em_separacao:['Em Separação','#7e57c2'],
  faturado:['Faturado','#00897b'], enviado:['Enviado','#1e88e5'], aguardando_retirada:['Aguardando Retirada','#f9a825'],
  atrasado:['Atrasado','#e53935'], entregue:['Entregue','#43a047'], devolvido:['Devolvido','#8d6e63'], cancelado:['Cancelado','#616161']
};
const ORDER = Object.keys(STATUS);
const fmtD = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const fmt = d => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
const money = v => 'R$ '+Number(v||0).toFixed(2).replace('.',',');
const esc = s => String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const badge = s => { const x=STATUS[s]||[s,'#9e9e9e']; return `<span class="badge" style="background:${x[1]}">${x[0]}</span>`; };
function bordadoRows(b){
  if(!b||!Array.isArray(b)||!b.length) return '';
  const inner = b.map(x=>{
    const nome=[x.linha1,x.linha2].filter(Boolean).join(' · ');
    const det=[x.tipo,x.cor&&('cor '+x.cor),x.fonte&&('fonte '+x.fonte),x.lado].filter(Boolean).join(' · ');
    return `<div style="padding:3px 0"><b style="color:var(--brand)">✒️ ${esc(nome)||'Personalização'}</b>${det?` <span class="muted">(${esc(det)})</span>`:''}${x.detalhes?`<div class="muted">${esc(x.detalhes)}</div>`:''}</div>`;
  }).join('');
  return `<tr><th>Bordado</th><td>${inner}</td></tr>`;
}
const api = (path, opts={}) => fetch('/api/'+path, { ...opts, headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+TOKEN, ...(opts.headers||{}) } }).then(r=>r.json());

let state = { filterStatus:'', q:'' };

async function boot(){
  TOKEN = readSession();
  if(!TOKEN){ document.getElementById('login').style.display='block'; return; }
  document.getElementById('app').style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); render(t.dataset.tab); });
  document.getElementById('runBtn').onclick = async ()=>{ document.getElementById('runBtn').textContent='Rodando…'; await api('rastreio-sync'); document.getElementById('runBtn').textContent='Rodar ciclo agora'; render('orders'); };
  render('orders');
}

async function render(tab){
  const v = document.getElementById('view');
  if(tab==='rules') return renderRules(v);
  if(tab==='retirada') return renderRetirada(v);
  const data = await api('rastreio-orders'+(state.filterStatus?`?status=${state.filterStatus}`:'')+(state.q?`${state.filterStatus?'&':'?'}q=${encodeURIComponent(state.q)}`:''));
  let orders = data.orders||[], counts = data.counts||{};
  if(tab==='late') orders = orders.filter(o=>o.status==='atrasado'||o.acareacao_aberta);
  const chips = ['<span class="chip" onclick="__f(\'\')"><b>'+(counts._total||0)+'</b> Todos</span>']
    .concat(ORDER.map(s=>`<span class="chip" onclick="__f('${s}')"><b>${counts[s]||0}</b> ${STATUS[s][0]}</span>`)).join('');
  v.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="l">Total</div><div class="n">${counts._total||0}</div></div>
      <div class="kpi"><div class="l">Atrasados</div><div class="n" style="color:#e53935">${counts.atrasado||0}</div></div>
      <div class="kpi"><div class="l">Em acareação</div><div class="n" style="color:#e53935">${counts._acareacao||0}</div></div>
      <div class="kpi"><div class="l">Entregues</div><div class="n" style="color:#43a047">${counts.entregue||0}</div></div>
    </div>
    ${tab==='orders'?`<div class="chips">${chips}</div>
    <div style="margin-bottom:10px"><input id="q" placeholder="Buscar pedido, rastreio, cliente…" value="${esc(state.q)}" style="width:320px"> <button class="btn" onclick="__q()">Buscar</button></div>`:'<h3>Atrasados &amp; Acareação</h3>'}
    <table><thead><tr>
      <th>Situação</th><th>Pedido</th><th>NF</th><th>Preço</th><th>Criação</th><th>Envio</th><th>Entrega</th><th>Prazo</th><th>Transportadora</th><th>Destino</th><th>Ocorrência</th><th>Visitas</th>
    </tr></thead><tbody>
    ${orders.map(o=>`<tr>
      <td>${badge(o.status)}${o.acareacao_aberta?' <span title="Acareação" style="color:#e53935">●</span>':''}</td>
      <td><span class="link" onclick="__open(${o.id})">#${esc(o.numero)}</span></td>
      <td>${esc(o.nota_fiscal)||'—'}</td><td>${money(o.preco)}</td>
      <td>${fmtD(o.criado_em)}</td><td>${fmtD(o.data_envio)}</td><td>${fmtD(o.data_entrega)}</td>
      <td style="color:${o.prazo_entrega&&new Date(o.prazo_entrega)<new Date()&&!['entregue','cancelado','devolvido'].includes(o.status)?'#e53935':'#333'}">${fmtD(o.prazo_entrega)}</td>
      <td>${esc(o.transportadora)}</td><td>${esc(o.destino)||'—'}</td>
      <td class="muted" style="max-width:170px">${esc((o.ocorrencia||'').slice(0,50))||'—'}</td>
      <td style="text-align:center">${o.visitas||0}</td>
    </tr>`).join('') || '<tr><td colspan="12" class="muted" style="text-align:center;padding:24px">Nenhum pedido.</td></tr>'}
    </tbody></table>`;
}

window.__f = s => { state.filterStatus=s; render('orders'); };
window.__q = () => { state.q=document.getElementById('q').value.trim(); render('orders'); };

// --- Blocos do detalhe (espelham o cademeupedido original) ---
const FUNNEL = [['criado','Criado'],['pago','Pago'],['faturado','Faturado'],['enviado','Enviado'],['entregue','Entregue']];
const FPOS = {criado:0,pago:1,em_separacao:1,faturado:2,enviado:3,atrasado:3,aguardando_retirada:3,entregue:4,devolvido:4,cancelado:1};
function funnelRuler(o, history){
  const dateOf = {criado:o.criado_em, pago:null, faturado:null, enviado:o.data_envio, entregue:o.data_entrega};
  (history||[]).slice().reverse().forEach(h=>{ if(h.to_status && dateOf[h.to_status]==null) dateOf[h.to_status]=h.created_at; });
  const pos = FPOS[o.status] ?? 0;
  const special = (o.status==='cancelado'||o.status==='devolvido'||o.status==='atrasado');
  return `<div style="position:relative;padding-left:6px">`+FUNNEL.map((s,i)=>{
    const done = i<=pos && !(special && o.status!=='atrasado' && i>1);
    const isCur = i===pos;
    const line = i<FUNNEL.length-1 ? `<div style="position:absolute;left:14px;top:24px;width:2px;height:26px;background:${i<pos?'var(--brand)':'#e5e7eb'}"></div>`:'';
    return `<div style="position:relative;display:flex;gap:12px;align-items:flex-start;min-height:44px">
      ${line}
      <div style="width:22px;height:22px;border-radius:50%;flex:none;background:${done?'var(--brand)':'#e5e7eb'};color:#fff;font-size:12px;line-height:22px;text-align:center;font-weight:700">${done?'✓':i+1}</div>
      <div><div style="font-weight:${isCur?'800':'600'};color:${done?'#222':'#999'}">${s[1]}</div>
      <div class="muted" style="font-size:12px">${dateOf[s[0]]?fmt(dateOf[s[0]]):(done?'':'—')}</div></div>
    </div>`;
  }).join('')+`</div>`
  + (special ? `<div style="margin-top:8px;background:#fff3f3;border:1px solid #ffcdd2;color:#c62828;padding:8px 10px;border-radius:8px;font-size:13px">Situação atual: <b>${STATUS[o.status][0]}</b></div>`:'');
}
function produtosBlock(prod){
  if(!prod||!Array.isArray(prod)||!prod.length) return '';
  const rows = prod.map(p=>`
    <div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #f2f2f2">
      <div style="width:46px;height:46px;border-radius:8px;background:#f3f3f5 center/cover no-repeat${p.imagem?` url('${esc(p.imagem)}')`:''};flex:none;border:1px solid #eee"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${esc(p.nome)||esc(p.sku)}</div>
        <div class="muted" style="font-size:12px">${p.tamanho?('Tam '+esc(p.tamanho)+' · '):''}${esc(p.sku)||''} · Qtd ${p.qtd||1}</div>
      </div>
      <div style="font-weight:600;font-size:13px">${money(p.preco)}</div>
    </div>`).join('');
  return `<h3 style="margin:4px 0 2px">Produtos</h3>${rows}`;
}
function clienteBlock(o){
  const c = (o.raw&&o.raw.cliente_contato)||{};
  const tel = c.telefone, doc = c.documento;
  const parts = [
    o.cliente_email?`✉️ ${esc(o.cliente_email)}`:'',
    tel?`📞 ${esc(tel)}`:'',
    doc?`🪪 ${esc(doc)}`:'',
  ].filter(Boolean).join(' &nbsp;·&nbsp; ');
  return parts || '';
}
function enderecoBlock(o){
  const e = o.raw&&o.raw.endereco_entrega;
  if(!e) return '';
  const linha = typeof e==='string'? e : [e.endereco||e.logradouro, e.numero, e.complemento, e.bairro, [e.cidade,e.estado||e.uf].filter(Boolean).join('/'), e.cep].filter(Boolean).join(', ');
  return linha?`<div style="margin-top:8px"><b style="font-size:13px">Endereço de entrega</b><div class="muted" style="font-size:13px">📍 ${esc(linha)}</div></div>`:'';
}

window.__open = async (id) => {
  const { order:o, events, history } = await api('rastreio-orders?id='+id);
  const tl = (events||[]).map((e,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f2f2f2"><div style="width:9px;height:9px;border-radius:50%;background:${i===0?'var(--brand)':'#ccc'};margin-top:5px;flex:none"></div><div><b style="font-size:13px">${esc(e.descricao)}</b><div class="muted" style="font-size:12px">${fmt(e.data)}${e.local?' · '+esc(e.local):''}</div></div></div>`).join('') || '<p class="muted">Sem eventos da transportadora ainda.</p>';
  const btns = ORDER.map(s=>`<button class="btn ghost" onclick="__st(${id},'${s}')" style="margin:0 4px 6px 0;${o.status===s?`border-color:${STATUS[s][1]};color:${STATUS[s][1]};font-weight:700`:''}">${STATUS[s][0]}</button>`).join('');
  document.getElementById('modal').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
      <h2 style="margin:0">Pedido #${esc(o.numero)} ${badge(o.status)}</h2>
      <span class="link" onclick="__close()">fechar ✕</span>
    </div>
    <div style="font-weight:700">${esc(o.cliente_nome)||'—'}</div>
    <div class="muted" style="margin-bottom:12px">${clienteBlock(o)}</div>
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:20px">
      <div>
        ${produtosBlock(o.raw&&o.raw.produtos)}
        <table style="box-shadow:none;margin-top:6px">
          <tr><th>Nota Fiscal</th><td>${esc(o.nota_fiscal)||'—'}</td></tr>
          <tr><th>Total</th><td>${money(o.preco)}</td></tr>
          <tr><th>Transportadora</th><td>${esc(o.transportadora)} ${esc(o.servico||'')}</td></tr>
          <tr><th>Rastreio</th><td>${esc(o.tracking_code)||'—'}</td></tr>
          ${bordadoRows(o.raw&&o.raw.bordado)}
          <tr><th>Prazo</th><td>${fmtD(o.prazo_entrega)}</td></tr>
          <tr><th>Visitas do cliente</th><td>${o.visitas||0}</td></tr>
          <tr><th>Acareação</th><td>${o.acareacao_aberta?`<span style="color:#e53935;font-weight:700">Aberta</span> ${fmtD(o.acareacao_em)} <button class="btn ghost" onclick="__ac(${id})">Encerrar</button>`:'—'}</td></tr>
        </table>
        ${enderecoBlock(o)}
      </div>
      <div>
        <h3 style="margin-top:0">Linha do tempo</h3>
        ${funnelRuler(o, history)}
        <h3 style="margin:16px 0 4px">Rastreio da transportadora</h3>
        <div style="max-height:180px;overflow:auto">${tl}</div>
      </div>
    </div>
    <div style="margin-top:14px;border-top:1px solid #eee;padding-top:12px">
      <div class="muted" style="margin-bottom:6px">Alterar situação (sincroniza com a Loja Integrada):</div>${btns}
      <div style="margin-top:8px"><button class="btn" onclick="__trk(${id})">Rastrear agora</button>
      <a class="btn ghost" style="text-decoration:none" target="_blank" href="/rastreio.html">Ver página do cliente ↗</a></div>
    </div>`;
  document.getElementById('modalBg').style.display='flex';
};
window.__close = () => document.getElementById('modalBg').style.display='none';
window.__st = async (id,s) => { await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:s})}); __open(id); render('orders'); };
window.__trk = async (id) => { await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'track',id})}); __open(id); render('orders'); };
window.__ac = async (id) => { await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'closeAcareacao',id})}); __open(id); render('orders'); };

async function renderRetirada(v){
  v.innerHTML='<p class="muted">Carregando…</p>';
  const data = await api('rastreio-orders');
  const local = (data.orders||[]).filter(o=>['local','motoboy'].includes(o.transportadora) && !['entregue','cancelado','devolvido'].includes(o.status));
  v.innerHTML = `<h3>Retirada na loja &amp; Entrega local (motoboy)</h3>
    <p class="muted">As meninas confirmam a <b>retirada</b> aqui; o motoboy confirma pela <a href="/entrega.html" target="_blank">página do entregador</a>. Ao confirmar, o pedido vira <b>Entregue</b> e aparece assim para o cliente.</p>
    <table><thead><tr><th>Situação</th><th>Pedido</th><th>Cliente</th><th>Serviço</th><th>Destino</th><th>Criação</th><th></th></tr></thead><tbody>
    ${local.map(o=>`<tr id="lr${o.id}">
      <td>${badge(o.status)}</td>
      <td><span class="link" onclick="__open(${o.id})">#${esc(o.numero)}</span></td>
      <td>${esc(o.cliente_nome)||'—'}</td><td>${esc(o.servico)||esc(o.transportadora)}</td>
      <td>${esc(o.destino)||'—'}</td><td>${fmtD(o.criado_em)}</td>
      <td><button class="btn" onclick="__entregar(${o.id})">✓ Entregue</button></td>
    </tr>`).join('') || '<tr><td colspan="7" class="muted" style="text-align:center;padding:24px">Nenhuma entrega local pendente.</td></tr>'}
    </tbody></table>`;
}
window.__entregar = async (id) => {
  if(!confirm('Confirmar entrega/retirada deste pedido?')) return;
  await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:'entregue'})});
  const row=document.getElementById('lr'+id); if(row) row.remove();
};

async function renderRules(v){
  const { rules } = await api('rastreio-rules');
  v.innerHTML = `<h3>Regras de automação</h3>
    <p class="muted">Condições (when) e ações (then). Ex.: motoboy sem SKU bordado → Entregue em 3 dias.</p>
    <table><thead><tr><th>Ativa</th><th>Nome</th><th>Prio.</th><th>when</th><th>then</th><th></th></tr></thead><tbody>
    ${(rules||[]).map(r=>`<tr>
      <td>${r.enabled?'Sim':'Não'}</td><td><b>${esc(r.name)}</b></td><td>${r.priority}</td>
      <td class="muted"><code>${esc(JSON.stringify(r.when_json))}</code></td>
      <td class="muted"><code>${esc(JSON.stringify(r.then_json))}</code></td>
      <td><button class="btn ghost" onclick="__rt(${r.id})">${r.enabled?'Desativar':'Ativar'}</button> <button class="btn ghost" onclick="__rd(${r.id})">Excluir</button></td>
    </tr>`).join('')}
    </tbody></table>
    <div style="background:#fff;border-radius:12px;padding:16px;margin-top:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <h4>Nova regra</h4>
      <div style="display:grid;grid-template-columns:1fr 120px;gap:10px">
        <input id="rn" placeholder="Nome da regra"><input id="rp" type="number" value="100">
        <textarea id="rw" rows="2" style="grid-column:1/3">{"carrier":["motoboy"],"statusIn":["enviado"],"skuNotContains":["BORD","PERS"],"daysSinceSentGte":3}</textarea>
        <textarea id="rt2" rows="2" style="grid-column:1/3">{"setStatus":"entregue","syncLI":true}</textarea>
        <div style="grid-column:1/3"><button class="btn" onclick="__rsave()">Salvar regra</button></div>
      </div>
    </div>`;
}
window.__rt = async id => { await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'toggle',id})}); renderRules(document.getElementById('view')); };
window.__rd = async id => { if(confirm('Excluir regra?')){ await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'delete',id})}); renderRules(document.getElementById('view')); } };
window.__rsave = async () => {
  try{
    const body = { name:document.getElementById('rn').value, priority:document.getElementById('rp').value,
      when:JSON.parse(document.getElementById('rw').value), then:JSON.parse(document.getElementById('rt2').value) };
    await api('rastreio-rules',{method:'POST',body:JSON.stringify(body)});
    renderRules(document.getElementById('view'));
  }catch(e){ alert('JSON inválido: '+e.message); }
};

boot();
</script>
