<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RASTREIOPEDIDO · Painel</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{ --brand:#3E7CB8; --orange:#FB9D3E; --blue-l:#DDEBF6; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f5f7;color:#222}
  a{color:inherit}
  svg{display:block}
  .shell{display:flex;min-height:100vh}
  .side{width:232px;background:#fff;border-right:1px solid #e9eaee;flex:none;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .logo{padding:20px 18px;font-weight:900;color:var(--orange);font-size:15px;letter-spacing:.5px;display:flex;align-items:center;gap:9px}
  .nav{flex:1;overflow:auto;padding:6px}
  .nav a{display:flex;align-items:center;gap:11px;justify-content:space-between;padding:11px 14px;margin:2px 6px;border-radius:10px;color:#555;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none}
  .nav a .lbl{display:flex;align-items:center;gap:11px}
  .nav a .ic{color:#9aa2ae;display:flex}
  .nav a.active{background:var(--blue-l);color:var(--brand)}
  .nav a.active .ic{color:var(--brand)}
  .nav a:hover{background:#f7f7fa}
  .nav a .cnt{font-size:12px;background:#eef0f4;color:#666;border-radius:20px;padding:1px 8px;font-weight:700}
  .nav a.active .cnt{background:var(--brand);color:#fff}
  .side .me{border-top:1px solid #eee;padding:14px 16px;font-size:12px;color:#777}
  .side .me b{color:#333;display:block;font-size:13px}
  .main{flex:1;min-width:0}
  .topbar{background:#fff;border-bottom:1px solid #e9eaee;padding:14px 22px;position:sticky;top:0;z-index:5}
  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-size:12px;color:#888;font-weight:600}
  .fld input,.fld select{padding:9px 11px;border:1px solid #dfe1e6;border-radius:9px;font-size:14px;min-width:150px;background:#fff}
  .content{padding:18px 22px}
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:#fff;border:1px solid #e9eaee;cursor:pointer;font-size:13px;font-weight:600;color:#555}
  .chip.active{border-color:var(--brand);color:var(--brand);box-shadow:0 0 0 1px var(--brand) inset}
  .chip .n{font-weight:800}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  th,td{padding:12px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f1f2f4}
  th{background:#fafbfc;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8a8f99}
  tr:hover td{background:#fbfbfd}
  .pill{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--orange);color:#fff;border:none;padding:9px 15px;border-radius:9px;font-weight:600;cursor:pointer;font-size:13px;text-decoration:none}
  .btn.ghost{background:#fff;color:#444;border:1px solid #dcdde1}
  .btn.orange{background:var(--orange)}
  .btn.wa{background:#25d366}
  .link{color:var(--brand);cursor:pointer;font-weight:700}
  .muted{color:#8a8f99;font-size:12px}
  input,textarea,select{font:inherit}
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,30,.45);display:none;align-items:flex-start;justify-content:center;z-index:20;padding:24px;overflow:auto}
  .modal{background:#fff;border-radius:16px;max-width:940px;width:100%;padding:24px;margin:auto}
  .close{cursor:pointer;color:#98a;display:flex;align-items:center;gap:5px;font-size:13px}
  #login{max-width:460px;margin:80px auto;background:#fff;padding:26px;border-radius:14px;text-align:center;box-shadow:0 6px 26px rgba(0,0,0,.08)}
  /* regras */
  .rule{background:#fff;border:1px solid #eef0f3;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .rule.off{opacity:.6}
  .rule .rname{font-weight:700;font-size:15px}
  .rule .cond{display:inline-flex;align-items:center;gap:6px;background:#f2f4f7;border-radius:8px;padding:3px 9px;font-size:12.5px;color:#444;margin:3px 5px 0 0}
  .rule .act{display:inline-flex;align-items:center;gap:6px;background:#eaf3fb;color:var(--brand);border-radius:8px;padding:3px 9px;font-size:12.5px;font-weight:600;margin:3px 5px 0 0}
  .sw{position:relative;width:42px;height:24px;flex:none;cursor:pointer}
  .sw input{opacity:0;width:0;height:0}
  .sw .tk{position:absolute;inset:0;background:#cfd3da;border-radius:20px;transition:.2s}
  .sw .tk:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + .tk{background:#2e9e4a}
  .sw input:checked + .tk:before{transform:translateX(18px)}
  .cbx{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid #dfe1e6;border-radius:20px;cursor:pointer;font-size:13px;margin:0 6px 6px 0;user-select:none}
  .cbx input{accent-color:var(--brand)}
  .card2{background:#fff;border:1px solid #eef0f3;border-radius:14px;padding:18px;margin-top:16px}
  .lblsec{font-size:12px;font-weight:800;letter-spacing:.5px;color:#8a8f99;text-transform:uppercase;margin:0 0 8px}
  @media(max-width:820px){ .side{display:none} }
</style>
</head>
<body>
<div id="login" style="display:none">
  <h2 style="color:var(--brand)">Cadê Meu Pedido</h2>
  <p class="muted">Você precisa estar logado no Sistema Grupo Aragão para acessar este painel.</p>
  <a class="btn" href="/" style="display:inline-block;text-decoration:none;margin-top:10px">Ir para o login</a>
</div>

<div id="app" class="shell" style="display:none">
  <aside class="side">
    <div class="logo"><img src="/favicon.png" alt="" width="27" height="27" style="border-radius:6px"> <span><span style="color:var(--orange)">RASTREIO</span><span style="color:var(--brand)">PEDIDO</span></span></div>
    <a href="/" style="display:flex;align-items:center;gap:8px;margin:0 12px 6px;padding:9px 12px;border-radius:10px;background:#f1f5f9;color:#334155;text-decoration:none;font-size:13px;font-weight:600"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Voltar ao Suite</a>
    <nav class="nav" id="nav"></nav>
    <div class="me"><b id="meNome">—</b><span id="meEmail"></span><br><a class="link" href="/" style="font-size:12px">Sair</a></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="filters">
        <div class="fld"><label>Pedido</label><input id="fPedido" placeholder="123456" oninput="__deb()"></div>
        <div class="fld"><label>Nota Fiscal</label><input id="fNF" placeholder="123456" oninput="__deb()"></div>
        <div class="fld"><label>Situação</label><select id="fSit" onchange="applyFilters()"><option value="">Todas</option></select></div>
        <div class="fld"><label>Transportadora</label><select id="fTrans" onchange="applyFilters()"><option value="">Selecione</option></select></div>
        <div class="fld"><label>Código de Rastreio</label><input id="fRastreio" placeholder="AA123..." oninput="__deb()"></div>
        <button class="btn ghost" onclick="load()"><span id="icAtu"></span> Atualizar</button>
        <button class="btn orange" id="runBtn" onclick="__runCycle()">Rodar ciclo</button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script type="module">
/* ---------- ícones SVG (Lucide-style) ---------- */
const S=(p,e='')=>`<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`.replace('width="18" height="18"',`width="${e||18}" height="${e||18}"`);
const IC={
  cart:S('<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>'),
  truck:S('<path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>'),
  users:S('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),
  alert:S('<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'),
  ret:S('<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>'),
  store:S('<path d="M3 9l1-5h16l1 5"/><path d="M4 9v11h16V9"/><path d="M3 9h18"/><path d="M9 20v-6h6v6"/>'),
  rules:S('<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>'),
  mail:S('<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/>','15'),
  phone:S('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>','15'),
  doc:S('<rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>','15'),
  pin:S('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>','15'),
  chat:S('<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>'),
  eye:S('<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'),
  x:S('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>','16'),
  refresh:S('<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>','15'),
  box:S('<path d="M21 8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/>'),
  chart:S('<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>'),
};

const SUPABASE_REF='wwytzoyeibekhstinott';
function readSession(){
  try{ let raw=localStorage.getItem('sb-'+SUPABASE_REF+'-auth-token');
    if(!raw){ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)){ raw=localStorage.getItem(k); break; } } }
    if(!raw) return null; const o=JSON.parse(raw); return {tok:o.access_token||o.currentSession?.access_token||null, user:o.user||o.currentSession?.user||null};
  }catch(e){ return null; }
}
let TOKEN=null, USER=null;

const STATUS={
  criado:['Criado','#eef1f6','#5b6472'], pago:['Pago','#e8ebff','#3f51b5'], em_separacao:['Em Separação','#f0e9ff','#7e57c2'],
  faturado:['Faturado','#e0f5f1','#00897b'], enviado:['Enviado','#e3f0fd','#1e88e5'], aguardando_retirada:['Aguardando Retirada','#fff6e0','#c98a00'],
  atrasado:['Atrasado','#fde8e8','#e53935'], entregue:['Entregue','#e6f6ea','#2e9e4a'], devolvido:['Devolvido','#efe7e2','#8d6e63'], cancelado:['Cancelado','#eceef1','#616161']
};
const ORDER=Object.keys(STATUS);
const CARRIERS={ correios:['Correios','#003399','#FFE11A'], jt:['J&T Express','#ffffff','#E2231A'], melhorenvio:['Melhor Envio','#ffffff','#0FAA57'], total:['Total Express','#ffffff','#12276b'], motoboy:['Motoboy','#ffffff','#6D28D9'], retirada:['Entrega Pessoalmente','#ffffff','#0EA5A4'], local:['Entrega local','#ffffff','#6D28D9'], sem:['Sem transportadora','#555','#eceef1'] };
const fmtD=d=>d?new Date(d).toLocaleDateString('pt-BR'):'—';
const fmtDs=d=>d?new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):'';
const fmt=d=>d?new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const money=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pill=s=>{const x=STATUS[s]||[s,'#eee','#555'];return `<span class="pill" style="background:${x[1]};color:${x[2]}">${x[0]}</span>`;};
const CARRIER_MARK={
  correios:'<rect width="24" height="24" rx="6" fill="#FFDD00"/><path d="M6.5 15.5l7-7" stroke="#00318F" stroke-width="2.3" stroke-linecap="round"/><path d="M10.3 8.5h4v4" stroke="#00318F" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>',
  jt:'<rect width="24" height="24" rx="6" fill="#E2231A"/><text x="12" y="16" font-size="8.5" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial,Helvetica,sans-serif">J&amp;T</text>',
  melhorenvio:'<rect width="24" height="24" rx="6" fill="#0FAA57"/><text x="12" y="16" font-size="9" font-weight="800" fill="#fff" text-anchor="middle" font-family="Arial,Helvetica,sans-serif">ME</text>',
  total:'<rect width="24" height="24" rx="6" fill="#12276B"/><text x="12" y="16" font-size="9" font-weight="800" fill="#fff" text-anchor="middle" font-family="Arial,Helvetica,sans-serif">TE</text>',
  motoboy:'<rect width="24" height="24" rx="6" fill="#6D28D9"/><g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="16" r="2.5"/><circle cx="17" cy="16" r="2.5"/><path d="M7 16h3.5l2.5-4.5h2.5"/><path d="M13 11.5l2 4.5"/><path d="M15.3 11.5H18"/></g>',
  retirada:'<rect width="24" height="24" rx="6" fill="#0EA5A4"/><g fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l1-3h12l1 3"/><path d="M6 9v9h12V9"/><path d="M5 9h14"/><path d="M10 18v-4h4v4"/></g>',
  local:'<rect width="24" height="24" rx="6" fill="#6D28D9"/><g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="16" r="2.5"/><circle cx="17" cy="16" r="2.5"/><path d="M7 16h3.5l2.5-4.5h2.5"/><path d="M13 11.5l2 4.5"/><path d="M15.3 11.5H18"/></g>',
  sem:'<rect width="24" height="24" rx="6" fill="#c9ced6"/><path d="M8 12h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>',
};
function carrierLogo(t){
  const mark=CARRIER_MARK[t]; const name=(CARRIERS[t]&&CARRIERS[t][0])||t||'—';
  const svg=mark?`<svg width="22" height="22" viewBox="0 0 24 24" style="border-radius:5px;flex:none">${mark}</svg>`:'';
  return `<span style="display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:13px">${svg}${esc(name)}</span>`;
}
function prazoTxt(o){
  if(['entregue','cancelado','devolvido'].includes(o.status)) return '—';
  if(!o.prazo_entrega) return '<span class="muted">—</span>';
  const diff=Math.ceil((new Date(o.prazo_entrega)-Date.now())/86400000);
  if(diff<0) return `<span style="color:#e53935;font-weight:700">Atrasado (${-diff}d)</span>`;
  if(diff===0) return `<span style="color:#c98a00;font-weight:700">Entrega hoje</span>`;
  return `Faltam ${diff} dia${diff>1?'s':''}`;
}
const api=(path,opts={})=>fetch('/api/'+path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}}).then(r=>r.json());

const NAV=[
  ['pedidos','cart','Pedidos'], ['atrasados','truck','Atrasados'], ['acareacoes','users','Acareações'],
  ['ocorrencias','alert','Ocorrências'], ['extravio','box','Extravio'], ['devolucao','ret','Devolução'],
  ['retirada','store','Retirada & Entrega'], ['estatisticas','chart','Estatísticas'], ['regras','rules','Regras'],
];
let VIEW='pedidos', DATA={orders:[],counts:{}}, filt={status:'',q:''};

async function boot(){
  const s=readSession();
  if(!s||!s.tok){ document.getElementById('login').style.display='block'; return; }
  TOKEN=s.tok; USER=s.user;
  document.getElementById('app').style.display='flex';
  document.getElementById('icAtu').innerHTML=IC.refresh;
  document.getElementById('meNome').textContent=(USER&&(USER.user_metadata?.name||USER.email))||'Equipe Dra. Charm';
  document.getElementById('meEmail').textContent=(USER&&USER.email)||'';
  const fSit=document.getElementById('fSit'); ORDER.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=STATUS[s][0];fSit.appendChild(o);});
  const fTr=document.getElementById('fTrans'); [['correios','Correios'],['jt','J&T Express'],['melhorenvio','Melhor Envio'],['total','Total Express'],['motoboy','Motoboy'],['retirada','Entrega Pessoalmente'],['sem','Sem transportadora']].forEach(([k,lbl])=>{const o=document.createElement('option');o.value=k;o.textContent=lbl;fTr.appendChild(o);});
  // fechar modal clicando fora
  document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') __close(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') __close(); });
  renderNav(); await load();
}
function renderNav(){
  const nav=document.getElementById('nav'); const c=DATA.counts||{};
  nav.innerHTML=NAV.map(n=>{
    let cnt=''; if(n[0]==='atrasados')cnt=c.atrasado||0; else if(n[0]==='acareacoes')cnt=c._acareacao||0; else if(n[0]==='devolucao')cnt=c.devolvido||0;
    return `<a class="${VIEW===n[0]?'active':''}" onclick="__go('${n[0]}')"><span class="lbl"><span class="ic">${IC[n[1]]}</span> ${n[2]}</span>${cnt?`<span class="cnt">${cnt}</span>`:''}</a>`;
  }).join('');
}
window.__go=(v)=>{
  VIEW=v;
  if(v!=='pedidos'){ filt={status:'',q:''}; ['fPedido','fNF','fRastreio'].forEach(id=>{const e=document.getElementById(id); if(e)e.value='';}); const s=document.getElementById('fSit'); if(s)s.value=''; const t=document.getElementById('fTrans'); if(t)t.value=''; }
  renderNav();
  if(v==='regras'||v==='estatisticas') render(); else load();
};
window.__runCycle=async()=>{ const b=document.getElementById('runBtn'); b.textContent='Rodando…'; try{await api('rastreio-sync');}catch(e){} b.textContent='Rodar ciclo'; load(); };

function barVal(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
async function load(){
  document.getElementById('view').innerHTML='<p class="muted">Carregando…</p>';
  const qp=[];
  if(VIEW==='pedidos'){
    if(filt.status) qp.push('status='+filt.status);
    if(filt.q) qp.push('q='+encodeURIComponent(filt.q));
    const tr=barVal('fTrans'); if(tr) qp.push('transportadora='+tr);
    const nf=barVal('fNF'); if(nf) qp.push('nf='+encodeURIComponent(nf));
    const rk=barVal('fRastreio'); if(rk) qp.push('rastreio='+encodeURIComponent(rk));
  }
  else if(VIEW==='atrasados') qp.push('status=atrasado');

// linha do tempo HORIZONTAL — inclui eventos de ocorrência como etapas (igual ao original)
function stepperH(o,history,ocorrencias){
  const dh={};
  (history||[]).slice().reverse().forEach(h=>{ if(h.to_status&&!dh[h.to_status]) dh[h.to_status]=h.created_at; });
  const dOf=(k,fb)=>fb||dh[k]||null;
  const P=FPOS[o.status]??0;
  const base=[
    {l:'Criado',d:o.criado_em,done:true},
    {l:'Pago',d:dOf('pago'),done:P>=1},
    {l:'Faturado',d:dOf('faturado'),done:P>=2},
    {l:'Enviado',d:dOf('enviado',o.data_envio),done:P>=3},
  ];
  const occ=(ocorrencias||[]).slice().sort((a,b)=>new Date(a.criada_em)-new Date(b.criada_em))
    .map(x=>({l:x.tipo,d:x.criada_em,done:true,warn:true}));
  const isDev=(o.status==='devolvido');
  const fin={l:isDev?'Devolvido ao Remetente':'Entregue',d:o.data_entrega,done:(o.status==='entregue'||isDev)};
  const nodes=[...base,...occ,fin];
  const firstPending=nodes.findIndex(n=>!n.done);
  const chk='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const warnIcon='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
  const steps=nodes.map((n,i)=>{
    const isCur=(i===firstPending);
    const col=n.warn?'#e6820e':'var(--brand)';
    const bg=n.done?col:(isCur?'#fff':'#e5e7eb');
    const ring=isCur?`box-shadow:inset 0 0 0 3px var(--brand);`:'';
    const inner=n.done?(n.warn?warnIcon:chk):(isCur?`<span style="width:9px;height:9px;border-radius:50%;background:var(--brand)"></span>`:(i+1));
    const line=i<nodes.length-1?`<div style="position:absolute;top:14px;left:50%;width:100%;height:3px;background:${n.done?col:'#e5e7eb'};z-index:0"></div>`:'';
    return `<div style="flex:1;text-align:center;position:relative;min-width:0">${line}
      <div style="position:relative;width:30px;height:30px;border-radius:50%;margin:0 auto;background:${bg};${ring}color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;z-index:1">${inner}</div>
      <div style="font-size:11.5px;margin-top:7px;font-weight:${(isCur||n.warn)?'800':'500'};color:${n.warn?'#c26a00':(n.done?'#222':'#9aa2ae')};line-height:1.2;word-break:break-word">${esc(n.l)}</div>
      <div style="font-size:11px;color:#aab">${n.d?fmtDs(n.d):''}</div></div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-start;padding:8px 6px 2px;overflow-x:auto">${steps}</div>`;
}

function slaColor(x){ return x>=95?'#43a047':x>=85?'#f9a825':'#e53935'; }
function gauge(pct,sub){
  const p=Math.max(0,Math.min(100,pct||0)); const t=p/100; const th=Math.PI*(1-t);
  const x=(100+80*Math.cos(th)).toFixed(1), y=(100-80*Math.sin(th)).toFixed(1);

    <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#eee" stroke-width="14" stroke-linecap="round"/>
    <path d="M20 100 A80 80 0 0 1 ${x} ${y}" fill="none" stroke="${slaColor(p)}" stroke-width="14" stroke-linecap="round"/>
    <text x="100" y="90" text-anchor="middle" font-size="30" font-weight="800" fill="#222">${p}%</text>
    <text x="100" y="114" text-anchor="middle" font-size="11" fill="#8a93a0">${esc(sub||'')}</text>
  </svg>`;
}
function hbars(items,unit){
  const max=Math.max(1,...items.map(i=>i.val||0));
  return items.map(i=>{
    const w=Math.round(((i.val||0)/max)*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>${esc(i.nome)}</span><b>${i.val==null?'—':i.val+(unit||'')}</b></div>
      <div style="background:#eef0f3;border-radius:6px;height:14px;overflow:hidden"><div style="width:${w}%;height:100%;background:${i.color||'var(--brand)'}"></div></div>
    </div>`;
  }).join('');
}

window.__open=async(id)=>{
  const {order:o,events,history,ocorrencias,emailConfigurado}=await api('rastreio-orders?id='+id);
  const tl=(events||[]).map((e,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f2f2f2"><div style="width:9px;height:9px;border-radius:50%;background:${i===0?'var(--brand)':'#ccc'};margin-top:5px;flex:none"></div><div><b style="font-size:13px">${esc(e.descricao)}</b><div class="muted" style="font-size:12px">${fmt(e.data)}${e.local?' · '+esc(e.local):''}</div></div></div>`).join('')||'<p class="muted">Sem eventos da transportadora ainda.</p>';
  const btns=ORDER.map(s=>`<button class="btn ghost" onclick="__st(${id},'${s}')" style="margin:0 5px 6px 0;${o.status===s?`border-color:${STATUS[s][2]};color:${STATUS[s][2]};font-weight:700`:''}">${STATUS[s][0]}</button>`).join('');
  const c=(o.raw&&o.raw.cliente_contato)||{};
  const waTel=(c.telefone||'').replace(/\D/g,'');
  const wa=waTel?(waTel.length<=11?'55'+waTel:waTel):'';
  const acompanhar=`/rastreio.html?doc=${encodeURIComponent(o.cliente_email||'')}&pedido=${encodeURIComponent(o.numero)}&preview=1`;
  document.getElementById('modal').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
      <div><div class="muted" style="font-size:12px">PEDIDO</div>
        <h2 style="margin:2px 0">#${esc(o.numero)} ${pill(o.status)}</h2>
        <div style="font-weight:700">${esc(o.cliente_nome)||'—'}</div>
        <div style="margin-top:3px;font-size:13px">${contatoLinha(o)} <button class="btn ghost" style="padding:1px 7px;font-size:11px" onclick="__altEmail(${id},'${esc(o.cliente_email||'')}')">✎ e-mail</button></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <a class="btn ghost" target="_blank" href="${acompanhar}">${IC.eye} Acompanhar Pedido</a>
        ${wa?`<a class="btn wa" target="_blank" href="https://wa.me/${wa}">${IC.chat} Falar com cliente</a>`:''}
        <button class="btn ghost" onclick="document.getElementById('ocNova').style.display=document.getElementById('ocNova').style.display==='none'?'block':'none'">${IC.alert||''} Ocorrência</button>
        <span class="close" onclick="__close()">${IC.x} fechar</span>
      </div>
    </div>
    <div style="margin:16px 0;background:#fafbfc;border:1px solid #eef0f3;border-radius:12px;padding:14px 16px">${stepperH(o,history,ocorrencias)}</div>
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:22px">
      <div>
        <h3 style="margin:2px 0 8px">Produtos</h3>
        ${produtosBlock(o.raw&&o.raw.produtos)}
        ${enderecoBlock(o)}
      </div>
      <div>
        <table style="box-shadow:none">
          <tr><th>Nota Fiscal</th><td>${o.nota_fiscal?`Nº ${esc(o.nota_fiscal)} <span class="muted" style="font-size:11px">· Ativa</span>${o.raw&&o.raw.nf_link?` <a class="btn ghost" style="padding:2px 8px;font-size:11px" target="_blank" href="${esc(o.raw.nf_link)}">Ver NF</a>`:''}${o.raw&&o.raw.chave_danfe?`<div class="muted" style="font-size:10.5px;word-break:break-all">chave ${esc(o.raw.chave_danfe)}</div>`:''}`:'—'}</td></tr>
          <tr><th>Total do Pedido</th><td>${money(o.preco)}</td></tr>
          <tr><th>Transportadora</th><td>${carrierLogo(o.transportadora)} <span class="muted">${esc(servicoLimpo(o.servico))}</span></td></tr>
          <tr><th>Código de Rastreio</th><td>${esc(o.tracking_code)||'—'} <button class="btn ghost" style="padding:2px 8px;font-size:11px;margin-left:4px" onclick="__altRastreio(${id},'${esc(o.tracking_code||'')}')">Alterar</button></td></tr>
          ${bordadoRows(o.raw&&o.raw.bordado)}
          <tr><th>Prazo de Entrega</th><td>${o.prazo_entrega?fmtD(o.prazo_entrega):'—'} ${['entregue','cancelado','devolvido'].includes(o.status)?'':'· '+prazoTxt(o)}</td></tr>
          <tr><th>Visitas do cliente</th><td>${o.visitas||0}</td></tr>
          <tr><th>Acareação</th><td>${o.acareacao_aberta?`<span style="color:#e53935;font-weight:700">Aberta</span> ${fmtD(o.acareacao_em)} <button class="btn ghost" onclick="__ac(${id})">Encerrar</button>`:'—'}</td></tr>
        </table>
        <h3 style="margin:16px 0 4px">Rastreio da transportadora</h3>
        <div style="max-height:150px;overflow:auto">${tl}</div>
      </div>
    </div>
    <div style="margin-top:18px;border-top:1px solid #eee;padding-top:14px">
      <h3 style="margin:0 0 10px">Ocorrências</h3>
      ${ocorrenciasBlock(ocorrencias,id,emailConfigurado)}
    </div>
    <div style="margin-top:18px;border-top:1px solid #eee;padding-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      ${modalBottom(o,id)}
    </div>`;
  document.getElementById('modalBg').style.display='flex';
};
window.__close=()=>document.getElementById('modalBg').style.display='none';
window.__st=async(id,s)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:s})}); __open(id); load(); };
window.__trk=async(id)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'track',id})}); __open(id); };
window.__ac=async(id)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'closeAcareacao',id})}); __open(id); load(); };
window.__voltar=async(id)=>{ if(!confirm('Voltar o pedido para a situação anterior?'))return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'voltarStatus',id})}); __open(id); load(); };
window.__arquivar=async(id)=>{ if(!confirm('Arquivar este pedido? Ele sai da lista de pedidos ativos.'))return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'arquivar',id})}); __close(); load(); };
window.__ocAbrir=async(id)=>{ const tipo=document.getElementById('ocTipoSel').value; const notificar=!!document.getElementById('ocNotif')?.checked; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaAbrir',id,tipo,notificar})}); __open(id); load(); };
window.__ocComentar=async(id,ocId)=>{ const el=document.getElementById('ocCm'+ocId); const texto=(el?.value||'').trim(); if(!texto)return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaComentar',ocId,texto})}); __open(id); };
window.__ocTratativa=async(id,ocId)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaTratativa',ocId})}); __open(id); };
window.__ocFechar=async(id,ocId)=>{ if(!confirm('Fechar esta ocorrência?'))return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaFechar',ocId})}); __open(id); load(); };
window.__ocNotificar=async(id,ocId)=>{ const r=await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaNotificar',ocId})}); if(!r.ok)alert('Não foi possível enviar o e-mail: '+(r.email?.reason||'')); __open(id); };
window.__ocNotifTransp=async(id,ocId)=>{ await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'ocorrenciaNotifTransp',ocId})}); __open(id); };
window.__altRastreio=async(id,atual)=>{ const c=prompt('Novo código de rastreio:',atual||''); if(c===null)return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'alterarRastreio',id,tracking_code:c})}); __open(id); load(); };
window.__altEmail=async(id,atual)=>{ const e=prompt('E-mail do cliente:',atual||''); if(e===null)return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'alterarEmail',id,email:e})}); __open(id); };

/* ---------- Retirada & Entrega ---------- */
function renderRetirada(v){
  const local=(DATA.orders||[]).filter(o=>['local','motoboy'].includes(o.transportadora)&&!['entregue','cancelado','devolvido'].includes(o.status));
  v.innerHTML=`<h2 style="margin:2px 0 6px">Retirada na loja & Entrega local (motoboy)</h2>
    <p class="muted" style="margin-bottom:12px">As meninas confirmam a <b>retirada</b> aqui; o motoboy confirma pela <a class="link" href="/entrega.html" target="_blank">página do entregador</a>. Ao confirmar, o pedido vira <b>Entregue</b>.</p>
    <table><thead><tr><th>Situação</th><th>Pedido</th><th>Cliente</th><th>Serviço</th><th>Destino</th><th>Criação</th><th></th></tr></thead><tbody>
    ${local.map(o=>`<tr id="lr${o.id}"><td>${pill(o.status)}</td><td><span class="link" onclick="__open(${o.id})">${esc(o.numero)}</span></td>
      <td>${esc(o.cliente_nome)||'—'}</td><td>${esc(o.servico)||carrierLogo(o.transportadora)}</td><td>${esc(o.destino)||'—'}</td><td>${fmtD(o.criado_em)}</td>
      <td><button class="btn" onclick="__entregar(${o.id})">Entregue</button></td></tr>`).join('')||'<tr><td colspan="7" class="muted" style="text-align:center;padding:24px">Nenhuma entrega local pendente.</td></tr>'}
    </tbody></table>`;
}
window.__entregar=async(id)=>{ if(!confirm('Confirmar entrega/retirada deste pedido?'))return; await api('rastreio-orders',{method:'POST',body:JSON.stringify({action:'setStatus',id,status:'entregue'})}); const r=document.getElementById('lr'+id); if(r)r.remove(); };

/* ---------- Regras (visual, sem JSON) ---------- */
const carLabel=k=>(CARRIERS[k]&&CARRIERS[k][0])||k;
function describeWhen(w){
  w=w||{}; const p=[];
  if(w.carrier&&w.carrier.length) p.push('Transportadora: '+w.carrier.map(carLabel).join(' ou '));
  if(w.statusIn&&w.statusIn.length) p.push('Situação: '+w.statusIn.map(s=>(STATUS[s]&&STATUS[s][0])||s).join(' ou '));
  if(w.ufIn&&w.ufIn.length) p.push('UF: '+w.ufIn.join('/'));
  if(w.noTrackingCode) p.push('Sem código de rastreio');
  if(w.skuContains&&w.skuContains.length) p.push('Produto com '+w.skuContains.join('/'));
  if(w.skuNotContains&&w.skuNotContains.length) p.push('Produto sem '+w.skuNotContains.join('/'));
  if(w.daysSinceSentGte!=null) p.push('Passaram '+w.daysSinceSentGte+'+ dias do envio');
  if(w.daysSinceCreatedGte!=null) p.push('Passaram '+w.daysSinceCreatedGte+'+ dias da criação');
  return p.length?p:['Qualquer pedido'];
}
function describeThen(t){
  t=t||{}; const p=[];
  if(t.setStatus) p.push('Marcar como '+((STATUS[t.setStatus]&&STATUS[t.setStatus][0])||t.setStatus)+(t.syncLI?' (sincroniza LI)':''));
  if(t.setPrazoDias!=null) p.push('Definir prazo de '+t.setPrazoDias+' dias');
  if(t.openAcareacao) p.push('Abrir acareação');
  if(t.alertInternal) p.push('Alertar a equipe');
  if(t.notifyCustomer) p.push('Avisar o cliente');
  return p.length?p:['Nenhuma ação'];
}
async function renderRules(v){
  const {rules}=await api('rastreio-rules');
  const cards=(rules||[]).filter(r=>!String(r.name).startsWith('__')).sort((a,b)=>a.priority-b.priority).map(r=>`
    <div class="rule ${r.enabled?'':'off'}">
      <div style="display:flex;align-items:center;gap:12px">
        <label class="sw"><input type="checkbox" ${r.enabled?'checked':''} onchange="__rt(${r.id})"><span class="tk"></span></label>
        <div style="flex:1"><div class="rname">${esc(r.name)}</div>
          <div style="margin-top:4px"><span class="muted" style="font-weight:700;font-size:11px">SE</span> ${describeWhen(r.when_json).map(x=>`<span class="cond">${esc(x)}</span>`).join('')}</div>
          <div style="margin-top:3px"><span style="color:var(--brand);font-weight:700;font-size:11px">ENTÃO</span> ${describeThen(r.then_json).map(x=>`<span class="act">${esc(x)}</span>`).join('')}</div>
        </div>
        <button class="btn ghost" onclick="__rd(${r.id})">Excluir</button>
      </div>
    </div>`).join('')||'<p class="muted">Nenhuma regra ainda. Crie a primeira abaixo.</p>';
  const carChecks=Object.keys(CARRIERS).map(k=>`<label class="cbx"><input type="checkbox" id="wc_${k}"> ${carLabel(k)}</label>`).join('');
  const stChecks=['pago','faturado','enviado','atrasado','aguardando_retirada'].map(s=>`<label class="cbx"><input type="checkbox" id="ws_${s}"> ${STATUS[s][0]}</label>`).join('');
  v.innerHTML=`<h2 style="margin:2px 0 4px">Regras de automação</h2>
    <p class="muted" style="margin-bottom:14px">Automatize situações e alertas. As regras rodam a cada ciclo, da prioridade menor para a maior.</p>
    ${cards}
    <div class="card2">
      <h3 style="margin:0 0 12px">Nova regra</h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div class="fld" style="flex:1;min-width:220px"><label>Nome da regra</label><input id="rn" placeholder="Ex.: Correios sem rastreio há 2 dias"></div>
        <div class="fld" style="width:130px"><label>Prioridade</label><input id="rp" type="number" value="100"></div>
      </div>
      <div class="lblsec">Se o pedido...</div>
      <div style="margin-bottom:6px"><div class="muted" style="margin-bottom:5px">for de alguma transportadora:</div>${carChecks}</div>
      <div style="margin-bottom:6px"><div class="muted" style="margin-bottom:5px">estiver na situação:</div>${stChecks}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:8px 0 4px">
        <label class="cbx"><input type="checkbox" id="wNoTrack"> Estiver sem código de rastreio</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px">e passaram <input id="wDays" type="number" min="0" placeholder="0" style="width:70px;padding:7px;border:1px solid #dfe1e6;border-radius:8px"> dias ou mais do envio</label>
      </div>
      <div class="lblsec" style="margin-top:16px">Então...</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        <select id="tAction" onchange="__ruleActionChange()" style="padding:9px 11px;border:1px solid #dfe1e6;border-radius:9px;font-size:14px">
          <option value="alert">Alertar a equipe</option>
          <option value="status">Mudar a situação para…</option>
          <option value="acareacao">Abrir acareação</option>
          <option value="prazo">Definir prazo de entrega</option>
        </select>
        <select id="tStatus" style="display:none;padding:9px 11px;border:1px solid #dfe1e6;border-radius:9px;font-size:14px">${ORDER.map(s=>`<option value="${s}">${STATUS[s][0]}</option>`).join('')}</select>
        <label id="tSyncWrap" class="cbx" style="display:none"><input type="checkbox" id="tSync" checked> Sincronizar com a Loja Integrada</label>
        <span id="tPrazoWrap" style="display:none;align-items:center;gap:8px;font-size:13px">prazo de <input id="tPrazo" type="number" value="3" style="width:70px;padding:7px;border:1px solid #dfe1e6;border-radius:8px"> dias</span>
      </div>
      <div style="margin-top:16px"><button class="btn" onclick="__rsaveVisual()">Salvar regra</button></div>
    </div>`;
}
window.__ruleActionChange=()=>{
  const a=document.getElementById('tAction').value;
  document.getElementById('tStatus').style.display=a==='status'?'inline-block':'none';
  document.getElementById('tSyncWrap').style.display=a==='status'?'inline-flex':'none';
  document.getElementById('tPrazoWrap').style.display=a==='prazo'?'inline-flex':'none';
};
window.__rt=async id=>{ await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'toggle',id})}); renderRules(document.getElementById('view')); };
window.__rd=async id=>{ if(confirm('Excluir esta regra?')){ await api('rastreio-rules',{method:'POST',body:JSON.stringify({action:'delete',id})}); renderRules(document.getElementById('view')); } };
window.__rsaveVisual=async()=>{
  const name=document.getElementById('rn').value.trim();
  if(!name){ alert('Dê um nome para a regra.'); return; }
  const when={}, then={};
  const carriers=Object.keys(CARRIERS).filter(k=>document.getElementById('wc_'+k).checked); if(carriers.length) when.carrier=carriers;
  const sts=['pago','faturado','enviado','atrasado','aguardando_retirada'].filter(s=>document.getElementById('ws_'+s).checked); if(sts.length) when.statusIn=sts;
  if(document.getElementById('wNoTrack').checked) when.noTrackingCode=true;
  const days=parseInt(document.getElementById('wDays').value,10); if(days>0) when.daysSinceSentGte=days;
  const a=document.getElementById('tAction').value;
  if(a==='alert') then.alertInternal=true;
  else if(a==='status'){ then.setStatus=document.getElementById('tStatus').value; if(document.getElementById('tSync').checked) then.syncLI=true; }
  else if(a==='acareacao') then.openAcareacao=true;
  else if(a==='prazo') then.setPrazoDias=parseInt(document.getElementById('tPrazo').value,10)||3;
  await api('rastreio-rules',{method:'POST',body:JSON.stringify({name,priority:document.getElementById('rp').value||100,when,then})});
  renderRules(document.getElementById('view'));
};

boot();
</script>
</body>
</html>
