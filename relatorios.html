<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatórios — Sistema Grupo Aragão</title>
<link rel="icon" type="image/png" href="https://cdn.awsli.com.br/1930/1930166/arquivos/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode:'class', theme:{ extend:{ colors:{
  ink:{900:'#0b1220',800:'#111827',700:'#1f2937',600:'#374151'}, accent:{DEFAULT:'#e91e63',600:'#db2777'} }}}};
</script>
<style>
  html{background:#f1f5f9}html.dark{background:#0b1220}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0}
  .kpi{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px}
  .dark .kpi{background:#1e293b;border-color:#334155}
  [data-fade]{animation:fade .2s ease}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .bar{height:8px;border-radius:999px;background:#f1f5f9}.dark .bar{background:#334155}
  .bar > span{display:block;height:100%;border-radius:999px}
</style>
</head>
<body class="text-slate-800 dark:text-slate-100">

<div id="authGate" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-ink-900">
  <div class="text-center">
    <div class="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-pink-500 to-rose-500 text-white font-bold text-2xl flex items-center justify-center mb-4">A</div>
    <div class="font-semibold mb-1">Relatórios</div><div class="text-sm text-slate-500 mb-4">Faça login na Suíte para acessar.</div>
    <a href="/" class="inline-block text-sm font-semibold text-white bg-pink-500 hover:bg-pink-600 px-4 py-2 rounded-lg">Ir para o login</a>
  </div>
</div>

<div id="appWrap" class="hidden max-w-5xl mx-auto">
<header class="h-14 flex items-center justify-between px-4 bg-white/95 dark:bg-ink-800/95 border-b border-slate-200 dark:border-ink-600 sticky top-0 z-30 backdrop-blur">
  <div class="flex items-center gap-3">
    <button onclick="location.href='/'" title="Voltar à Suíte" class="w-9 h-9 rounded-xl bg-gradient-to-br from-pink-500 to-rose-500 text-white font-bold flex items-center justify-center shadow hover:scale-105 transition">A</button>
    <div class="leading-tight"><div class="text-sm font-semibold">Relatórios</div><div class="text-[11px] text-slate-500 dark:text-slate-400">Atendimento e automações · Grupo Aragão</div></div>
  </div>
  <div class="flex items-center gap-1">
    <button onclick="carregar()" class="text-sm px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-ink-700 hover:bg-slate-200">Atualizar</button>
    <button onclick="location.href='/'" class="w-9 h-9 rounded-lg hover:bg-slate-100 dark:hover:bg-ink-700 flex items-center justify-center text-slate-500" title="Voltar"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></button>
    <button onclick="document.documentElement.classList.toggle('dark')" class="w-9 h-9 rounded-lg hover:bg-slate-100 dark:hover:bg-ink-700 flex items-center justify-center text-slate-500" title="Tema"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
</header>

<div class="p-4 space-y-6" id="conteudo">
  <div class="text-sm text-slate-400">Carregando métricas…</div>
</div>
</div>

<script>
const SUPA = { url:'https://wwytzoyeibekhstinott.supabase.co', key:'sb_publishable_uMoCEK4Ed_u8ZIfjVZ7Jrg_tdR4b9bO' };
let sb=null;
async function getSb(){ if(!sb){ const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2'); sb=createClient(SUPA.url,SUPA.key,{auth:{persistSession:true,autoRefreshToken:true}}); } return sb; }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x])); }
async function count(tabela, filtro){ const c=await getSb(); let q=c.from(tabela).select('*',{count:'exact',head:true}); if(filtro) q=filtro(q); const { count:n }=await q; return n||0; }

async function bootstrap(){
  const c=await getSb(); const { data:{ session } }=await c.auth.getSession();
  if(!session){ document.getElementById('authGate').classList.remove('hidden'); return; }
  document.getElementById('appWrap').classList.remove('hidden');
  carregar();
}

async function carregar(){
  const c=await getSb();
  const hojeISO=new Date(new Date().setHours(0,0,0,0)).toISOString();
  const [convs, fila, gats, totalClientes, totalMsgs, msgsHoje] = await Promise.all([
    c.from('at_conversas').select('status, atendente:profiles(full_name)').limit(2000).then(r=>r.data||[]),
    c.from('at_fila_envios').select('status').limit(5000).then(r=>r.data||[]),
    c.from('at_gatilhos').select('ativo, categoria').then(r=>r.data||[]),
    count('at_clientes'),
    count('at_mensagens'),
    count('at_mensagens', q=>q.gte('enviada_em',hojeISO)),
  ]);

  const cs = { aberta:0, pendente:0, encerrada:0 };
  const porAtend = {};
  convs.forEach(x=>{ cs[x.status]=(cs[x.status]||0)+1; const a=(x.atendente&&x.atendente.full_name)||'Não atribuído'; porAtend[a]=(porAtend[a]||0)+1; });
  const totalConv = convs.length;
  const fs = { pendente:0, enviado:0, falha:0, cancelado:0 };
  fila.forEach(x=>{ fs[x.status]=(fs[x.status]||0)+1; });
  const gatAtivos = gats.filter(g=>g.ativo).length;

  const el=document.getElementById('conteudo');
  el.innerHTML=`
  <div data-fade>
    <div class="text-sm font-semibold mb-2">Atendimento</div>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      ${kpi('Conversas', totalConv, 'slate')}
      ${kpi('Abertas', cs.aberta||0, 'emerald')}
      ${kpi('Pendentes', cs.pendente||0, 'amber')}
      ${kpi('Encerradas', cs.encerrada||0, 'slate')}
      ${kpi('Clientes', totalClientes, 'pink')}
    </div>
  </div>

  <div data-fade>
    <div class="text-sm font-semibold mb-2">Mensagens</div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      ${kpi('Total de mensagens', totalMsgs, 'blue')}
      ${kpi('Mensagens hoje', msgsHoje, 'blue')}
      ${kpi('Gatilhos ativos', gatAtivos+'/'+gats.length, 'teal')}
      ${kpi('Na fila (pendente)', fs.pendente, 'amber')}
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4" data-fade>
    <div class="kpi">
      <div class="text-sm font-semibold mb-3">Conversas por atendente</div>
      ${barras(porAtend, totalConv, '#db2777')}
    </div>
    <div class="kpi">
      <div class="text-sm font-semibold mb-3">Fila de envios</div>
      ${barras({Pendente:fs.pendente,Enviado:fs.enviado,Falha:fs.falha,Cancelado:fs.cancelado}, fila.length||1, '#0ea5e9')}
      <div class="text-[11px] text-slate-400 mt-2">Os envios saem quando o WhatsApp estiver conectado.</div>
    </div>
  </div>

  <div class="text-[11px] text-slate-400" data-fade>Atualizado em ${new Date().toLocaleString('pt-BR')}</div>`;
}

function kpi(label, valor, cor){
  const cores={slate:'text-slate-700 dark:text-slate-200',emerald:'text-emerald-600',amber:'text-amber-600',pink:'text-pink-600',blue:'text-blue-600',teal:'text-teal-600'};
  return `<div class="kpi"><div class="text-[12px] text-slate-500 dark:text-slate-400">${esc(label)}</div><div class="text-2xl font-bold mt-1 ${cores[cor]||''}">${esc(valor)}</div></div>`;
}
function barras(obj, total, cor){
  const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  if(!entries.length||entries.every(e=>!e[1])) return '<div class="text-sm text-slate-400">Sem dados ainda.</div>';
  return entries.map(([k,v])=>`
    <div class="mb-2">
      <div class="flex justify-between text-[13px] mb-1"><span>${esc(k)}</span><span class="font-semibold">${v}</span></div>
      <div class="bar"><span style="width:${Math.round((v/(total||1))*100)}%;background:${cor}"></span></div>
    </div>`).join('');
}

bootstrap();
</script>
<script src="/nav.js"></script>
</body>
</html>
