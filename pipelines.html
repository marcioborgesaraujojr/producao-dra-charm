<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Funil de Leads — Sistema Grupo Aragão</title>
<link rel="icon" type="image/png" href="https://cdn.awsli.com.br/1930/1930166/arquivos/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode:'class', theme:{ extend:{ colors:{
  ink:{900:'#0b1220',800:'#111827',700:'#1f2937',600:'#374151'}, accent:{DEFAULT:'#e91e63',600:'#db2777'} }}}};
</script>
<style>
  html{background:#f1f5f9}html.dark{background:#0b1220}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0}
  .fld{padding:8px 10px;font-size:14px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;outline:none}
  .fld:focus{border-color:#db2777}.dark .fld{background:#1f2937;border-color:#374151;color:#e5e7eb}
  .bin{background:#fff;border:1px solid #eef2f7}.dark .bin{background:#1f2937;border-color:#334155}
  .col{width:260px;flex:0 0 260px;background:#f1f5f9;border-radius:12px}.dark .col{background:#111827}
  .scrollx{overflow-x:auto;scrollbar-width:thin}
  [data-fade]{animation:fade .18s ease}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="text-slate-800 dark:text-slate-100">

<div id="authGate" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-ink-900">
  <div class="text-center">
    <div class="w-14 h-14 mx-auto rounded-2xl overflow-hidden mb-4"><img src="/aragao-180.png" alt="Aragão" class="w-full h-full object-cover"></div>
    <div class="font-semibold mb-1">Funil de Leads</div><div class="text-sm text-slate-500 mb-4">Faça login na Suíte para acessar.</div>
    <a href="/" class="inline-block text-sm font-semibold text-white bg-pink-500 hover:bg-pink-600 px-4 py-2 rounded-lg">Ir para o login</a>
  </div>
</div>

<div id="appWrap" class="hidden">
<header class="h-14 flex items-center justify-between px-4 bg-white/95 dark:bg-ink-800/95 border-b border-slate-200 dark:border-ink-600 sticky top-0 z-30 backdrop-blur">
  <div class="flex items-center gap-3">
    <button onclick="location.href='/'" title="Voltar à Suíte" class="w-9 h-9 rounded-xl overflow-hidden shadow hover:scale-105 hover:shadow-md transition"><img src="/aragao-180.png" alt="Aragão" class="w-full h-full object-cover"></button>
    <div class="leading-tight"><div class="text-sm font-semibold">Funil de Leads</div><div class="text-[11px] text-slate-500 dark:text-slate-400">Pipeline / CRM · Grupo Aragão</div></div>
  </div>
  <div class="flex items-center gap-2">
    <select id="pipeSel" onchange="abrir(this.value)" class="fld text-sm"></select>
    <button onclick="novoPipe()" class="text-xs font-semibold text-white bg-pink-500 hover:bg-pink-600 px-2.5 py-2 rounded-lg">+ Funil</button>
    <button onclick="location.href='/'" class="w-9 h-9 rounded-lg hover:bg-slate-100 dark:hover:bg-ink-700 flex items-center justify-center text-slate-500" title="Voltar"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></button>
    <button onclick="document.documentElement.classList.toggle('dark')" class="w-9 h-9 rounded-lg hover:bg-slate-100 dark:hover:bg-ink-700 flex items-center justify-center text-slate-500" title="Tema"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
</header>

<div class="p-4">
  <div class="flex items-center gap-2 mb-3">
    <select id="leadSel" class="fld text-sm"><option value="">Escolher lead…</option></select>
    <button onclick="addLead()" class="text-sm font-semibold px-3 py-2 rounded-lg bg-pink-50 text-pink-700 dark:bg-pink-900/30 dark:text-pink-300">+ Adicionar ao funil</button>
    <span id="pipeInfo" class="text-[12px] text-slate-400 ml-2"></span>
  </div>
  <div id="board" class="scrollx flex gap-3 pb-4" style="min-height:60vh"></div>
</div>
</div>

<script>
const SUPA = { url:'https://wwytzoyeibekhstinott.supabase.co', key:'sb_publishable_uMoCEK4Ed_u8ZIfjVZ7Jrg_tdR4b9bO' };
let sb=null, PIPES=[], PIPE=null, CARDS=[], CLIENTES=[];
async function getSb(){ if(!sb){ const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2'); sb=createClient(SUPA.url,SUPA.key,{auth:{persistSession:true,autoRefreshToken:true}}); } return sb; }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x])); }

async function bootstrap(){
  const c=await getSb(); const { data:{ session } }=await c.auth.getSession();
  if(!session){ document.getElementById('authGate').classList.remove('hidden'); return; }
  document.getElementById('appWrap').classList.remove('hidden');
  const [{data:pipes},{data:clis}]=await Promise.all([ c.from('at_pipelines').select('*').order('created_at'), c.from('at_clientes').select('id,nome,telefone').order('nome') ]);
  PIPES=pipes||[]; CLIENTES=clis||[];
  document.getElementById('pipeSel').innerHTML=PIPES.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');
  document.getElementById('leadSel').innerHTML='<option value="">Escolher lead…</option>'+CLIENTES.map(cl=>`<option value="${cl.id}">${esc(cl.nome)}${cl.telefone?(' · '+esc(cl.telefone)):''}</option>`).join('');
  if(PIPES.length){ abrir(PIPES[0].id); }
  c.channel('pipe').on('postgres_changes',{event:'*',schema:'public',table:'at_pipeline_cards'},()=>{ if(PIPE) recarregarCards(); }).subscribe();
}
async function abrir(id){ PIPE=PIPES.find(p=>p.id===id); document.getElementById('pipeSel').value=id; await recarregarCards(); }
async function recarregarCards(){
  const c=await getSb();
  const { data }=await c.from('at_pipeline_cards').select('*, cliente:at_clientes(nome,telefone)').eq('pipeline_id',PIPE.id);
  CARDS=data||[]; render();
}
function render(){
  const fases=PIPE.fases||[]; const el=document.getElementById('board');
  document.getElementById('pipeInfo').textContent=CARDS.length+' lead(s) no funil "'+PIPE.nome+'"';
  el.innerHTML=fases.map(f=>{
    const cards=CARDS.filter(x=>x.fase===f);
    return `<div class="col p-2" data-fade>
      <div class="flex items-center justify-between px-1 py-1.5"><span class="text-[13px] font-semibold">${esc(f)}</span><span class="text-[11px] text-slate-400">${cards.length}</span></div>
      <div class="space-y-2">
        ${cards.map(cd=>cardHtml(cd,fases)).join('')||'<div class="text-[11px] text-slate-400 px-1 py-2">—</div>'}
      </div>
    </div>`;
  }).join('');
}
function cardHtml(cd,fases){
  const cli=cd.cliente||{};
  return `<div class="bin rounded-lg p-2.5 shadow-sm" data-fade>
    <div class="flex items-center justify-between gap-2">
      <span class="text-[13px] font-semibold truncate">${esc(cli.nome||'Lead')}</span>
      <button onclick="removerCard('${cd.id}')" class="text-slate-300 hover:text-red-500 text-xs">✕</button>
    </div>
    ${cli.telefone?`<div class="text-[11px] text-slate-400">${esc(cli.telefone)}</div>`:''}
    <select onchange="moverCard('${cd.id}',this.value)" class="fld text-[12px] w-full mt-1.5 py-1">
      ${fases.map(f=>`<option value="${esc(f)}" ${f===cd.fase?'selected':''}>${esc(f)}</option>`).join('')}
    </select>
  </div>`;
}
async function moverCard(id,fase){ const c=await getSb(); const cd=CARDS.find(x=>x.id===id); if(cd) cd.fase=fase; render();
  try{ await c.from('at_pipeline_cards').update({fase}).eq('id',id); }catch(e){ console.warn(e.message); } }
async function removerCard(id){ const c=await getSb(); CARDS=CARDS.filter(x=>x.id!==id); render();
  try{ await c.from('at_pipeline_cards').delete().eq('id',id); }catch(e){} }
async function addLead(){ const cliId=document.getElementById('leadSel').value; if(!cliId||!PIPE) return;
  if(CARDS.some(x=>x.cliente_id===cliId)){ alert('Esse lead já está no funil.'); return; }
  const fase=(PIPE.fases||['Novo'])[0];
  try{ const c=await getSb(); await c.from('at_pipeline_cards').insert({pipeline_id:PIPE.id, cliente_id:cliId, fase}); document.getElementById('leadSel').value=''; recarregarCards(); }
  catch(e){ alert('Erro: '+e.message); } }
async function novoPipe(){
  const nome=prompt('Nome do funil:'); if(!nome) return;
  const fasesStr=prompt('Fases (separadas por vírgula):','Novo, Em contato, Negociando, Ganho, Perdido'); if(fasesStr===null) return;
  const fases=fasesStr.split(',').map(s=>s.trim()).filter(Boolean);
  try{ const c=await getSb(); const {data,error}=await c.from('at_pipelines').insert({nome, fases}).select().single(); if(error) throw error;
    PIPES.push(data); document.getElementById('pipeSel').innerHTML=PIPES.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join(''); abrir(data.id);
  }catch(e){ alert('Erro: '+e.message); } }
bootstrap();
</script>
<script src="/nav.js"></script>
</body>
</html>
