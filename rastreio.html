<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Central de Rastreamento · Dra. Charm</title>
<script>
// Callback OAuth do Bling: se voltar com ?code=, troca por token NO ATO
// (o code do Bling expira em segundos, por isso a troca é feita aqui).
(async function(){
  var code=new URLSearchParams(location.search).get('code');
  if(!code) return;
  var ok=false, msg='';
  try{ var r=await fetch('/api/rastreio-sync?bling=exchange&code='+encodeURIComponent(code)); var j=await r.json(); ok=j.ok; msg=j.error||''; }
  catch(e){ msg=e.message; }
  document.addEventListener('DOMContentLoaded',function(){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;top:0;left:0;right:0;padding:14px;text-align:center;font-weight:700;z-index:999;color:#fff;background:'+(ok?'#43a047':'#e53935');
    el.textContent=ok?'Bling Taymah conectado com sucesso ✓':('Falha ao conectar Bling: '+msg);
    document.body.appendChild(el);
  });
})();
</script>
<style>
  :root{ --brand:#c2185b; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(160deg,#c2185b12,#f7f7fa);min-height:100vh;color:#222}
  .box{max-width:560px;margin:0 auto;padding:40px 18px}
  .head{text-align:center;margin-bottom:22px}
  .head img{max-height:52px}
  .head .name{font-size:22px;font-weight:800;color:var(--brand)}
  .card{background:#fff;border-radius:16px;padding:26px;box-shadow:0 6px 26px rgba(0,0,0,.07)}
  h1{font-size:20px;margin:0 0 4px}
  p.sub{color:#777;font-size:14px;margin:0 0 18px}
  label{display:block;font-size:13px;color:#555;margin:12px 0 4px;font-weight:600}
  input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px}
  button{width:100%;margin-top:18px;background:var(--brand);color:#fff;border:none;padding:13px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff}
  .result{margin-top:20px}
  .err{background:#fff3f3;border:1px solid #ffcdd2;color:#c62828;padding:14px;border-radius:10px;margin-top:18px}
  .step{display:flex;gap:14px;padding:12px 0}
  .dot{width:14px;height:14px;border-radius:50%;background:#d0d0d0;flex:none;margin-top:3px}
  .dot.on{background:var(--brand)}
  .foot{text-align:center;color:#aaa;font-size:12px;margin-top:22px}
  .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:center;border-bottom:1px solid #f0f0f0;padding-bottom:14px;margin-bottom:8px}
  .meta{display:flex;gap:20px;flex-wrap:wrap;font-size:14px;color:#555;margin-bottom:6px}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <!-- Troque pela sua logo (BRAND_LOGO_URL). -->
    <div class="name">Dra. Charm</div>
  </div>
  <div class="card">
    <h1>Central de Rastreamento de Pedidos</h1>
    <p class="sub">Insira sua identificação e o número do pedido para acompanhar a entrega.</p>
    <form id="f">
      <label>E-mail ou CPF</label>
      <input id="doc" required placeholder="seu@email.com ou 000.000.000-00">
      <label>Pedido (opcional)</label>
      <input id="pedido" placeholder="Nº do pedido">
      <button type="submit">Rastrear Pedido</button>
    </form>
    <div id="result" class="result"></div>
  </div>
  <div class="foot">Dra. Charm · contato@dracharm.com.br</div>
</div>

<script>
const STATUS = {
  criado:['Criado','#9e9e9e'], pago:['Pago','#3f51b5'], em_separacao:['Em Separação','#7e57c2'],
  faturado:['Faturado','#00897b'], enviado:['Enviado','#1e88e5'], aguardando_retirada:['Aguardando Retirada','#f9a825'],
  atrasado:['Atrasado','#e53935'], entregue:['Entregue','#43a047'], devolvido:['Devolvido ao Remetente','#8d6e63'], cancelado:['Cancelado','#616161']
};
const fmt = d => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
const fmtD = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const esc = s => String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function bordadoBox(b){
  if(!b || !Array.isArray(b) || !b.length) return '';
  const rows = b.map(x=>{
    const nome = [x.linha1,x.linha2].filter(Boolean).join(' · ');
    const det = [x.cor?('Cor: '+x.cor):'', x.fonte?('Fonte: '+x.fonte):''].filter(Boolean).join(' · ');
    return `<div style="padding:6px 0;border-bottom:1px solid #f3e6ee">
      <div style="font-weight:700">✒️ ${esc(nome)||'Personalização'}</div>
      ${det?`<div style="color:#a05; font-size:13px">${esc(det)}</div>`:''}</div>`;
  }).join('');
  return `<div style="background:#fff5fa;border:1px solid #f3d6e6;border-radius:12px;padding:12px 14px;margin:10px 0">
    <div style="font-weight:800;color:var(--brand);margin-bottom:4px">Bordado personalizado</div>${rows}</div>`;
}

// Régua de status (stepper) — igual ao cademeupedido
const FUNNEL = [['criado','Criado'],['pago','Pago'],['faturado','Faturado'],['enviado','Enviado'],['entregue','Entregue']];
function stepper(status){
  // índice do status atual no funil (atrasado conta como Enviado)
  let cur = FUNNEL.findIndex(s=>s[0]===status);
  if(status==='atrasado') cur = 3;
  if(status==='aguardando_retirada') cur = 3;
  const special = (status==='cancelado'||status==='devolvido') ? (STATUS[status]||[status])[0] : null;
  const dots = FUNNEL.map((s,i)=>{
    const done = i<=cur && cur>=0;
    return `<div style="flex:1;text-align:center;position:relative">
      <div style="width:22px;height:22px;border-radius:50%;margin:0 auto;background:${done?'var(--brand)':'#e0e0e0'};color:#fff;font-size:12px;line-height:22px">${done?'✓':i+1}</div>
      <div style="font-size:11px;margin-top:5px;color:${done?'#333':'#aaa'}">${s[1]}</div>
      ${i<FUNNEL.length-1?`<div style="position:absolute;top:11px;left:60%;width:80%;height:2px;background:${i<cur?'var(--brand)':'#e0e0e0'}"></div>`:''}
    </div>`;
  }).join('');
  const warn = status==='atrasado' ? `<div style="background:#fff3f3;border:1px solid #ffcdd2;color:#c62828;padding:10px 12px;border-radius:8px;margin-top:12px;font-size:13px">A entrega está demorando mais que o previsto. Já estamos acompanhando com a transportadora.</div>` : '';
  const spec = special ? `<div style="background:#f5f5f5;color:#555;padding:10px 12px;border-radius:8px;margin-top:12px;font-size:13px">Situação: <b>${special}</b></div>` : '';
  return `<div style="display:flex;margin:6px 0 4px">${dots}</div>${warn}${spec}`;
}

document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const doc = document.getElementById('doc').value.trim();
  const pedido = document.getElementById('pedido').value.trim();
  const box = document.getElementById('result');
  box.innerHTML = '<p style="color:#999">Buscando…</p>';
  try{
    const r = await fetch('/api/rastreio-lookup?doc='+encodeURIComponent(doc)+'&pedido='+encodeURIComponent(pedido));
    const data = await r.json();
    if(!r.ok){ box.innerHTML = '<div class="err">'+esc(data.error||'Não encontrado.')+'</div>'; return; }
    const o = data.order, evs = data.events||[];
    const st = STATUS[o.status]||[o.status,'#9e9e9e'];
    const steps = evs.length ? evs.map((ev,i)=>`
      <div class="step"><div class="dot ${i===0?'on':''}"></div>
      <div><div style="font-weight:600">${esc(ev.descricao)}</div>
      <div style="color:#999;font-size:13px">${fmt(ev.data)}${ev.local?' · '+esc(ev.local):''}</div></div></div>`).join('')
      : '<p style="color:#999">Ainda não há eventos de rastreio. Assim que o pedido for despachado, as atualizações aparecerão aqui.</p>';
    box.innerHTML = `
      <div style="background:#fff;border:1px solid #f0f0f0;border-radius:16px;padding:20px;margin-top:8px">
        <div class="row">
          <div><div style="font-size:13px;color:#999">Pedido</div><div style="font-size:20px;font-weight:800">#${esc(o.numero)}</div></div>
          <div><span class="badge" style="background:${st[1]}">${st[0]}</span></div>
        </div>
        <div class="meta">
          ${o.transportadora?`<div><b>Transportadora:</b> ${esc(o.transportadora)} ${esc(o.servico||'')}</div>`:''}
          ${o.tracking_code?`<div><b>Rastreio:</b> ${esc(o.tracking_code)}</div>`:''}
          ${o.prazo_entrega?`<div><b>Previsão:</b> ${fmtD(o.prazo_entrega)}</div>`:''}
        </div>
        ${bordadoBox(o.bordado)}
        ${stepper(o.status)}
        <h3 style="margin:16px 0 4px">Acompanhe sua entrega</h3>
        ${steps}
      </div>`;
  }catch(err){ box.innerHTML = '<div class="err">Erro ao consultar. Tente novamente.</div>'; }
});

// Vindo do painel (Acompanhar Pedido): preenche e busca automaticamente.
(function(){
  const p=new URLSearchParams(location.search);
  const doc=p.get('doc'), ped=p.get('pedido');
  if(doc){ document.getElementById('doc').value=doc; if(ped) document.getElementById('pedido').value=ped;
    document.getElementById('f').dispatchEvent(new Event('submit',{cancelable:true})); }
})();
</script>
</body>
</html>
